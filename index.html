            <span style={{ fontFamily:M, fontSize:9, fontWeight:900, color:K.r }}>BREAK {sc.breakScore??sc.breakProb??"-"}</span>
            <span style={{ fontFamily:M, fontSize:8, color:K.tm, marginLeft:4 }}>{sc.scoresAreHeuristic?"heur":"%"}</span>
            {sc.breakTargets?.length > 0 && <span style={{ fontFamily:M, fontSize:9, color:K.tm, marginLeft:8 }}>→ ${sc.breakTargets[0]?.level?.toFixed?.(2)}</span>}
          </div>
        </div>
      )}

      {/* BRIEF TEXT */}
      {pkt.briefHtml && (
        <div style={{ fontFamily:M, fontSize:10.5, lineHeight:1.7, color:K.tx, background:K.sf, borderRadius:6, padding:"12px 14px", border:"1px solid "+K.cb, maxHeight:200, overflowY:"auto" }}
          dangerouslySetInnerHTML={{ __html: pkt.briefHtml }} />
      )}

      {/* KEY SUPPORTS FOR STRIKE SELECTION */}
      {pkt.supports?.length > 0 && (
        <div style={{ display:"flex", gap:6, flexWrap:"wrap", alignItems:"center" }}>
          <span style={{ fontFamily:M, fontSize:8, color:K.tm, letterSpacing:1 }}>SUPPORTS:</span>
          {pkt.supports.slice(0,5).map((s,i) => (
            <span key={i} style={{ fontFamily:M, fontSize:9, padding:"3px 8px", borderRadius:4, background:"rgba(34,197,94,0.06)", border:"1px solid rgba(34,197,94,0.15)", color:K.g }}>
              ${s.level?.toFixed?.(2)} <span style={{ color:K.tm, fontSize:8 }}>wt:{s.weightedStrength}</span>
            </span>
          ))}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   APP
   ═══════════════════════════════════════════════════════════════ */
function App() {
  const [mode, setMode] = useState("CONFIG");
  const [d1Status, setD1Status] = useState("LOCAL ONLY");

  const CFG_DEF = {
    aum:"", ror30:"0.04", pcsRor30:"0.20", maxBpsRiskPct:"0.02", maxCspNotionalPct:"0.25",
    maxDeploymentPct:"0.80", refreshSec:"60",
    sessionDate:"", sessionVix:"", sessionVixY:"", sessionLockedAt:null,
  };

  const loadCfg = () => { try { const s=localStorage.getItem(STORAGE.cfg); return s?{...CFG_DEF,...JSON.parse(s)}:CFG_DEF; } catch { return CFG_DEF; } };
  const loadPos = () => { try { const s=localStorage.getItem(STORAGE.positions); return s?JSON.parse(s):[]; } catch { return []; } };

  const [savedCfg, setSavedCfg] = useState(loadCfg);
  const [draft, setDraft] = useState(() => ({ ...loadCfg() }));
  const [cfgDirty, setCfgDirty] = useState(false);
  const [cfgMsg, setCfgMsg] = useState(null);

  const editCfg = (k, v) => { setDraft(p => ({ ...p, [k]: v })); setCfgDirty(true); setCfgMsg(null); };

  const commitCfg = () => {
    const a=parseFloat(draft.aum), r30=parseFloat(draft.ror30), pr30=parseFloat(draft.pcsRor30), vixToday=parseFloat(draft.sessionVix);
    const today=todayLocalYMD();
    if (!ok(a)||a<=0) { setCfgMsg("AUM required (>0)."); return; }
    if (!ok(r30)||r30<=0) { setCfgMsg("CSP RoR_30 required (>0)."); return; }
    if (!ok(pr30)||pr30<=0) { setCfgMsg("PCS RoR_30 required (>0)."); return; }
    if (!ok(vixToday)||vixToday<=0) { setCfgMsg("Today VIX required (>0)."); return; }

    let prev=null; try { prev=JSON.parse(localStorage.getItem(STORAGE.cfg)||"null"); } catch {}
    let vixY=null;
    const yesterday=addDays(today,-1);
    if (prev&&prev.sessionDate===yesterday&&ok(parseFloat(prev.sessionVix))) vixY=parseFloat(prev.sessionVix);
    else if (prev&&ok(parseFloat(prev.sessionVixY))) vixY=parseFloat(prev.sessionVixY);
    else vixY=vixToday;

    const nextCfg={...draft,sessionDate:today,sessionVix:String(vixToday),sessionVixY:String(vixY),sessionLockedAt:Date.now()};
    try { localStorage.setItem(STORAGE.cfg,JSON.stringify(nextCfg)); } catch {}
    if (D1_ENABLED) d1.saveConfig(nextCfg).catch(()=>{});
    setSavedCfg({...nextCfg}); setDraft({...nextCfg}); setCfgDirty(false); setCfgMsg("CONFIG SAVED");
  };

  const [positions, setPositions] = useState(loadPos);
  const persist = useCallback((next) => { setPositions(next); try { localStorage.setItem(STORAGE.positions,JSON.stringify(next)); } catch {} if (D1_ENABLED) d1.savePositions(next).catch(()=>{}); }, []);

  const [ticker, setTicker] = useState("");

  const loadWatch = () => { try { const s=localStorage.getItem(STORAGE.watch); return s?JSON.parse(s):[]; } catch { return []; } };
  const saveWatch = (arr) => { try { localStorage.setItem(STORAGE.watch,JSON.stringify(arr)); } catch {} if (D1_ENABLED) d1.saveWatchlist(arr).catch(()=>{}); };

  const [watch, setWatch] = useState(loadWatch);
  const [watchInput, setWatchInput] = useState("");
  const [scanMsg, setScanMsg] = useState(null);
  const [scanLoading, setScanLoading] = useState(false);

  const addToWatch = useCallback(() => {
    const parts=(watchInput||"").toUpperCase().split(/[\s,]+/).filter(Boolean);
    if (!parts.length) return;
    const next=Array.from(new Set([...parts,...watch.map(w=>w.ticker)])).slice(0,50).map(t=>{
      const existing=watch.find(x=>x.ticker===t);
      return existing||{ticker:t,last:null,asOf:null,refSpot:null,refTs:null};
    });
    setWatch(next); saveWatch(next); setWatchInput("");
  }, [watchInput, watch]);

  const removeFromWatch = useCallback((t) => { const next=watch.filter(w=>w.ticker!==t); setWatch(next); saveWatch(next); }, [watch]);
  const clearWatch = useCallback(() => { setWatch([]); saveWatch([]); }, []);
  const setWatchRefSpot = useCallback((ticker, val) => {
    const x=parseFloat(val);
    const next=watch.map(w=>w.ticker===ticker?{...w,refSpot:ok(x)?x:null,refTs:Date.now()}:w);
    setWatch(next); saveWatch(next);
  }, [watch]);

  const refreshWatch = useCallback(async () => {
    if (!watch.length) return;
    setScanLoading(true); setScanMsg(null);
    try {
      const next = await Promise.all(watch.map(async (w) => {
        try {
          const s=await fetchSnapshot(w.ticker);
          // Normalize numerics defensively
          const sp=Number(s?.spot),r10=Number(s?.rv10),r20=Number(s?.rv20);
          return {...w,last:{spot:ok(sp)?sp:null,rv10:ok(r10)?r10:null,rv20:ok(r20)?r20:null,spotError:s?.spotError||(!ok(sp)?"spot missing":null),rvError:s?.rvError||((!ok(r10)||!ok(r20))?"rv missing":null)},
            refSpot:ok(w.refSpot)?w.refSpot:(ok(sp)?sp:null),
            refTs:ok(w.refSpot)?w.refTs:(ok(sp)?Date.now():null),asOf:s?.asOf||Date.now()};
        } catch (e) { return {...w,last:{spot:null,rv10:null,rv20:null,spotError:String(e?.message||e),rvError:String(e?.message||e)},asOf:Date.now()}; }
      }));
      setWatch(next); saveWatch(next); setScanMsg("SCAN REFRESH OK "+fmtTime(Date.now()));
    } catch (e) { setScanMsg("SCAN REFRESH FAILED: "+(e?.message||e)); }
    setScanLoading(false);
  }, [watch]);

  // D1 hydration (auto-detect availability first)
  useEffect(() => {
    let cancelled=false;
    (async () => {
      await detectD1();
      if (!D1_ENABLED) { if (!cancelled) setD1Status("LOCAL ONLY"); return; }
      try {
        const [cfgRemote,posRemote,watchRemote]=await Promise.all([d1.loadConfig(),d1.loadPositions(),d1.loadWatchlist()]);
        if (cancelled) return;
        if (cfgRemote&&Object.keys(cfgRemote).length>0) { const merged={...CFG_DEF,...cfgRemote}; setSavedCfg(merged); setDraft({...merged}); try { localStorage.setItem(STORAGE.cfg,JSON.stringify(merged)); } catch {} }
        if (Array.isArray(posRemote)&&posRemote.length>0) { setPositions(posRemote); try { localStorage.setItem(STORAGE.positions,JSON.stringify(posRemote)); } catch {} }
        if (Array.isArray(watchRemote)&&watchRemote.length>0) { setWatch(watchRemote); try { localStorage.setItem(STORAGE.watch,JSON.stringify(watchRemote)); } catch {} }
        setD1Status("SYNCED");
      } catch (e) { console.warn("D1 hydration failed:",e); if (!cancelled) setD1Status("LOCAL ONLY"); }
    })();
    return () => { cancelled=true; };
  }, []);

  useEffect(() => {
    if (mode!=="SCAN") return;
    refreshWatch();
    const sec=Math.max(30,parseInt(savedCfg.refreshSec||"60",10)||60);
    const id=setInterval(refreshWatch,sec*1000);
    return () => clearInterval(id);
  }, [mode, refreshWatch, savedCfg.refreshSec]);

  const [structure, setStructure] = useState("CSP");
  const [spot, setSpot] = useState("");
  const [expiry, setExpiry] = useState("");
  const [dte, setDte] = useState("");
  const [iv, setIv] = useState("");
  const [rv10, setRv10] = useState("");
  const [rv20, setRv20] = useState("");
  const [strike, setStrike] = useState("");
  const [width, setWidth] = useState("");
  const [credit, setCredit] = useState("");
  const [contracts, setContracts] = useState("1");

  const [snapLoading, setSnapLoading] = useState(false);
  const [snapMsg, setSnapMsg] = useState(null);
  const [res, setRes] = useState(null);
  const [err, setErr] = useState(null);
  const [dashLiveMsg, setDashLiveMsg] = useState(null);
  const [dashRefreshing, setDashRefreshing] = useState(false);
  const [openPos, setOpenPos] = useState(null);

  /* ═══ ANALYST PACKET STATE ═══ */
  const [analystPkt, setAnalystPkt] = useState(null);
  const [analystMsg, setAnalystMsg] = useState(null);

  const handleExpiryChange = useCallback((val) => { setExpiry(val); setDte(computeDTE(val)); }, []);

  /* ═══ IMPORT ANALYST PACKET FROM CLIPBOARD ═══ */
  const importAnalystPacket = useCallback(async () => {
    setAnalystMsg(null);
    try {
      const text = await navigator.clipboard.readText();
      if (!text || text.length > 500000) throw new Error("Clipboard empty or too large");
      const pkt = JSON.parse(text);
      const vErr = validatePacket(pkt);
      if (vErr) throw new Error(vErr);
      setAnalystPkt(pkt);
      savePendingPacket(pkt);
      setTicker(pkt.ticker);
      setSpot(String(Number(pkt.spot).toFixed(2)));
      setRes(null); setErr(null);
      setAnalystMsg("IMPORTED");
    } catch (e) {
      setAnalystMsg("FAIL: " + (e?.message || e));
      setAnalystPkt(null);
    }
  }, []);

  const clearAnalystPacket = useCallback(() => {
    setAnalystPkt(null); setAnalystMsg(null);
    clearPendingPacket();
  }, []);

  const clearAllFields = useCallback(() => {
    setTicker(""); setSpot(""); setExpiry(""); setDte(""); setIv("");
    setRv10(""); setRv20(""); setStrike(""); setWidth(""); setCredit("");
    setContracts("1"); setRes(null); setErr(null); setSnapMsg(null);
    setAnalystPkt(null); setAnalystMsg(null);
    clearPendingPacket();
  }, []);

  /* Auto-import pending packet when NEW TRADE opens */
  useEffect(() => {
    if (mode !== "NEW") return;
    if (analystPkt) return;
    const pkt = loadPendingPacket();
    if (!pkt) return;
    const vErr = validatePacket(pkt);
    if (vErr) { clearPendingPacket(); return; }
    setAnalystPkt(pkt);
    setTicker(pkt.ticker);
    setSpot(String(Number(pkt.spot).toFixed(2)));
    setRes(null); setErr(null);
    setAnalystMsg("AUTO-IMPORTED (ROUTE)");
    clearPendingPacket();
  }, [mode]);

  const sessionVix = useMemo(() => parseFloat(savedCfg.sessionVix), [savedCfg.sessionVix]);
  const sessionVixY = useMemo(() => { const v=parseFloat(savedCfg.sessionVixY); return ok(v)?v:sessionVix; }, [savedCfg.sessionVixY, sessionVix]);
  const sessionReady = useMemo(() => ok(sessionVix) && ok(sessionVixY), [sessionVix, sessionVixY]);

  const handleLoadSnapshot = useCallback(async () => {
    const t=ticker.trim().toUpperCase(); if (!t) return;
    setSnapLoading(true); setSnapMsg(null);
    try {
      const raw=await fetchSnapshot(t);
      // Normalize: coerce to Number before ok() check (handles string payloads)
      const snap={...raw, spot:Number(raw.spot), rv10:Number(raw.rv10), rv20:Number(raw.rv20)};
      if (ok(snap.spot)) setSpot(String(snap.spot.toFixed(2)));
      if (ok(snap.rv10)) setRv10(String(snap.rv10.toFixed(4)));
      if (ok(snap.rv20)) setRv20(String(snap.rv20.toFixed(4)));
      setSnapMsg(`${t} | Spot $${ok(snap.spot)?snap.spot.toFixed(2):"NA"} | RV10 ${(ok(snap.rv10)?snap.rv10*100:0).toFixed(1)}% | RV20 ${(ok(snap.rv20)?snap.rv20*100:0).toFixed(1)}%`);
    } catch (e) { setSnapMsg("Fetch failed: "+(e?.message||e)); }
    setSnapLoading(false);
  }, [ticker]);

  const rec = useMemo(() => {
    const S=parseFloat(spot), IV=parseFloat(iv), D=parseInt(dte,10);
    if (!sessionReady) return null;
    if (![S,IV].every(ok)||!ok(D)||D<=0) return null;
    const rg=regime(sessionVix), c=RC[rg], em=expectedMove(S,IV,D);
    const rawStrike=S-c.sig*em, inc=strikeIncrementFromSpot(S), recStrike=roundToInc(rawStrike,inc);
    const cspR30=parseFloat(savedCfg.ror30||"0.04"), pcsR30=parseFloat(savedCfg.pcsRor30||"0.20");
    const cspMin=rorMinDTE(cspR30,D), pcsMin=rorMinDTE(pcsR30,D);
    const base={rg,em,sig:c.sig,rawStrike,recStrike,pop:calcPopPut(S,recStrike,IV,D)};
    if (structure==="CSP") return {...base,mode:"CSP",rMin:cspMin,minCredit:ok(cspMin)?(recStrike*cspMin):NaN};
    const rMin=pcsMin;
    const ct=Math.max(1,parseInt(contracts,10)||1);
    const aum=parseFloat(savedCfg.aum)||0;
    const bpsPct=parseFloat(savedCfg.maxBpsRiskPct||"0.02");
    const wRec=recPcsWidth(aum,rMin,ct,bpsPct);
    if (wRec.err) return {...base,mode:"PCS",pcsErr:wRec.err,riskCap:wRec.riskCap};
    const userW=parseFloat(width);
    const effW=(ok(userW)&&userW>0)?userW:wRec.w;
    const minCredit=pcsMinCredit(effW,rMin);
    return {...base,mode:"PCS",rMin,autoWidth:!(ok(userW)&&userW>0),recWidth:wRec.w,effWidth:effW,longStrike:recStrike-effW,minCredit,maxLossPS:effW-minCredit,risk:(effW-minCredit)*100*ct,riskCap:wRec.riskCap};
  }, [spot,iv,dte,structure,contracts,width,savedCfg,sessionVix,sessionReady]);

  const handleEval = useCallback(() => {
    setErr(null); setRes(null);
    if (!sessionReady) { setErr("Set today's VIX in CONFIG first."); return; }
    const ct=parseInt(contracts,10); if (!ok(ct)||ct<1) { setErr("Contracts required."); return; }
    if (!expiry||!dte) { setErr("Expiry required."); return; }
    const effStrike=strike!==""?strike:(rec?.recStrike!=null?String(rec.recStrike):"");
    const effWidth=structure==="PCS"?(width!==""?width:(rec?.effWidth!=null?String(rec.effWidth):"")):null;
    const out=evaluateTrade({structure,spot,strike:effStrike,width:effWidth,credit,contracts:String(ct),iv,dte,vix:String(sessionVix),vixY:String(sessionVixY),rv10,rv20},savedCfg,positions);
    if (out.error) setErr(out.error); else setRes(out);
  }, [sessionReady,contracts,expiry,dte,strike,width,structure,rec,spot,credit,iv,rv10,rv20,sessionVix,sessionVixY,savedCfg,positions]);

  const handleUseRec = useCallback(() => {
    if (!rec) return;
    setStrike(String(rec.recStrike));
    if (structure==="CSP") { if (ok(rec.minCredit)) setCredit(rec.minCredit.toFixed(2)); }
    else { if (rec.mode==="PCS"&&!rec.pcsErr) { setWidth(String(rec.effWidth)); if (ok(rec.minCredit)) setCredit(rec.minCredit.toFixed(2)); } }
  }, [rec, structure]);

  const saveToDash = useCallback(() => {
    setErr(null);
    if (!sessionReady) { setErr("Set today's VIX in CONFIG first."); return; }
    const t=ticker.trim().toUpperCase(); if (!t) { setErr("Ticker required."); return; }
    const ct=parseInt(contracts,10); if (!ok(ct)||ct<1) { setErr("Contracts required."); return; }
    const effStrike=strike!==""?parseFloat(strike):(rec?rec.recStrike:NaN);
    const effWidth=structure==="PCS"?(parseFloat(width)||(rec&&rec.effWidth?rec.effWidth:NaN)):null;
    if (!ok(effStrike)) { setErr("Strike required."); return; }
    if (structure==="PCS"&&!ok(effWidth)) { setErr("PCS width required."); return; }
    const entrySpot=parseFloat(spot),entryIV=parseFloat(iv),entryDTE=parseInt(dte,10),entryCR=parseFloat(credit);
    if (![entrySpot,entryIV,entryDTE,entryCR].every(ok)) { setErr("Fill all required inputs first."); return; }
    if (entryDTE<=0) { setErr("Cannot save expired trade."); return; }
    const entryEval=evaluateTrade({structure,spot:String(entrySpot),iv:String(entryIV),dte:String(entryDTE),strike:String(effStrike),width:structure==="PCS"?String(effWidth):null,credit:String(entryCR),contracts:String(ct),vix:String(sessionVix),vixY:String(sessionVixY),rv10:String(parseFloat(rv10)),rv20:String(parseFloat(rv20))},savedCfg,positions);
    if (entryEval.error) { setErr(entryEval.error); return; }
    const id=(crypto&&crypto.randomUUID)?crypto.randomUUID():String(Date.now());
    const recObj={
      id,ts:Date.now(),ticker:t,str:structure,
      identifiers:{expiry:(expiry||"").trim(),shortType:"put",shortStrike:effStrike},
      entry:{spot:entrySpot,strike:effStrike,width:structure==="PCS"?effWidth:null,credit:entryCR,iv:entryIV,dte:entryDTE,contracts:ct,vix:sessionVix,vixY:sessionVixY,rv10:parseFloat(rv10),rv20:parseFloat(rv20)},
      entryEval,
      // Analyst packet snapshot (lightweight — ticker, verdict, rec level, spot at analysis time)
      analystSnapshot:analystPkt?{ticker:analystPkt.ticker,ts:analystPkt.ts,tf:analystPkt.tf,
        grade:analystPkt.verdict?.grade,verdict:analystPkt.verdict?.verdict,total:analystPkt.verdict?.total,
        recLevel:analystPkt.recLevel?.level,recConf:analystPkt.recLevel?.confidence,
        analystSpot:analystPkt.spot}:null,
      live:{spot:entrySpot,rv10:parseFloat(rv10),rv20:parseFloat(rv20),asOf:Date.now(),shortIv:null,shortDelta:null,shortMid:null,optAsOf:null},
    };
    persist([recObj,...positions]); setMode("DASH");
  }, [sessionReady,ticker,structure,spot,iv,dte,strike,width,credit,contracts,expiry,savedCfg,positions,persist,rec,rv10,rv20,sessionVix,sessionVixY,analystPkt]);

  const deletePos = useCallback((id) => { const next=positions.filter(p=>p.id!==id); persist(next); if (openPos&&openPos.id===id) setOpenPos(null); }, [positions,persist,openPos]);
  const analyzePos = useCallback((p) => setOpenPos(p), []);

  const refreshDashboardLive = useCallback(async () => {
    if (!positions.length) return;
    setDashRefreshing(true); setDashLiveMsg(null);
    try {
      const tickers=Array.from(new Set(positions.map(p=>(p.ticker||"").trim().toUpperCase()).filter(Boolean)));
      const snaps={};
      await Promise.all(tickers.map(async(t)=>{try{snaps[t]=await fetchSnapshot(t);}catch{snaps[t]=null;}}));
      const next=positions.map(p=>{
        const t=(p.ticker||"").trim().toUpperCase();
        const s=snaps[t];
        const sp=Number(s?.spot),r10=Number(s?.rv10),r20=Number(s?.rv20);
        return {...p,live:{spot:ok(sp)?sp:(p.live?.spot??null),rv10:ok(r10)?r10:(p.live?.rv10??null),rv20:ok(r20)?r20:(p.live?.rv20??null),asOf:s?.asOf||Date.now(),shortIv:p.live?.shortIv??null,shortDelta:p.live?.shortDelta??null,shortMid:p.live?.shortMid??null,optAsOf:p.live?.optAsOf??null}};
      });
      persist(next);
      setDashLiveMsg("LIVE REFRESH OK "+fmtTime(Date.now()));
      if (openPos) { const u=next.find(x=>x.id===openPos.id); if (u) setOpenPos(u); }
    } catch (e) { setDashLiveMsg("REFRESH FAILED: "+(e?.message||e)); }
    setDashRefreshing(false);
  }, [positions,persist,openPos]);

  useEffect(() => { if (mode!=="DASH") return; refreshDashboardLive(); const sec=Math.max(20,parseInt(savedCfg.refreshSec||"60",10)||60); const id=setInterval(refreshDashboardLive,sec*1000); return ()=>clearInterval(id); }, [mode,refreshDashboardLive,savedCfg.refreshSec]);

  const openEval = useMemo(() => {
    if (!openPos) return null;
    const p=openPos, live=p.live||{};
    const S=ok(live.spot)?live.spot:p.entry.spot;
    const D=parseInt(computeDTE(p.identifiers?.expiry||""),10);
    const IV=ok(live.shortIv)?live.shortIv:p.entry.iv;
    const out=evaluateTrade({structure:p.str,spot:String(S),iv:String(IV),dte:String(D),strike:String(p.entry.strike),width:p.str==="PCS"?String(p.entry.width):null,credit:String(p.entry.credit),contracts:String(p.entry.contracts||1),vix:String(sessionVix),vixY:String(sessionVixY),rv10:String(ok(live.rv10)?live.rv10:p.entry.rv10),rv20:String(ok(live.rv20)?live.rv20:p.entry.rv20)},savedCfg,positions);
    if (out.error) return null;
    return {...out,dteLive:D,spotLive:S,ivLive:IV,vixLive:sessionVix};
  }, [openPos,savedCfg,positions,sessionVix,sessionVixY]);

  const openStatus = useMemo(() => {
    if (!openEval||!openPos) return { label:"AWAITING",color:K.tm,action:"ENTER DATA" };
    return positionStatus({dte:openEval.dteLive,sigma:openEval.sigmaDistance,reqSigma:openEval.reqSigma,pop:openEval.pop,spot:openEval.spotLive,breakEven:openEval.breakEven});
  }, [openEval, openPos]);

  const totals = useMemo(() => {
    const aum=parseFloat(savedCfg.aum)||0;
    let cspCollateral=0,pcsRisk=0,premiumCollected=0;
    for (const p of positions) {
      const ct=Number(p.entry?.contracts)||1, cr=Number(p.entry?.credit)||0;
      premiumCollected+=cr*100*ct;
      if (p.str==="CSP") cspCollateral+=(Number(p.entry?.strike)||0)*100*ct;
      else if (p.str==="PCS") { const w=Number(p.entry?.width)||0; pcsRisk+=(w-cr)*100*ct; }
    }
    const deployed=cspCollateral+pcsRisk;
    return {aum,cspCollateral,pcsRisk,deployed,deployedPct:aum>0?deployed/aum:0,premiumCollected};
  }, [positions,savedCfg.aum]);

  const gate = useMemo(() => {
    if (!res) return { sev:SEV.RED, title:"AWAITING", subtitle:!sessionReady?"SET TODAY VIX IN CONFIG":"ENTER INPUTS" };
    const failed=[];
    if (!res.sigmaPass) failed.push("SIGMA"); if (!res.vrpPass) failed.push("VRP"); if (!res.rorPass) failed.push("RoR"); if (res.capital&&!res.capital.pass) failed.push("CAPITAL");
    if (failed.length===0) return { sev:SEV.PASS, title:"PASS", subtitle:"ALL GATES CLEARED" };
    const hard=failed.includes("SIGMA")||failed.includes("CAPITAL");
    return { sev:hard?SEV.RED:SEV.WARN, title:"FAIL", subtitle:failed.join(" + ")+" FAILED" };
  }, [res, sessionReady]);

  return (
    <div style={{ minHeight:"100vh", background:K.bg, color:K.tx, fontFamily:"'DM Sans',-apple-system,sans-serif" }}>
      {/* HEADER */}
      <div style={{ borderBottom:"1px solid "+K.cb, padding:"12px 22px", display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:8, position:"sticky", top:0, zIndex:50, background:K.bg }}>
        <div style={{ display:"flex", alignItems:"baseline", gap:8 }}>
          <span style={{ fontFamily:M, fontSize:15, fontWeight:900, color:K.w, letterSpacing:2 }}>NUVO</span>
          <span style={{ fontFamily:M, fontSize:15, color:K.td, letterSpacing:2 }}>VSIM</span>
          <span style={{ fontSize:9, fontFamily:M, color:K.g, opacity:0.85, letterSpacing:1 }}>{APP_VER}</span>
          <span style={{ fontSize:8, fontFamily:M, padding:"2px 6px", borderRadius:4, letterSpacing:1, fontWeight:700,
            color:d1Status==="SYNCED"?K.g:d1Status==="LOCAL ONLY"?"#f59e0b":K.tm,
            background:d1Status==="SYNCED"?"rgba(34,197,94,0.08)":d1Status==="LOCAL ONLY"?"rgba(245,158,11,0.08)":"rgba(255,255,255,0.03)",
            border:"1px solid "+(d1Status==="SYNCED"?"rgba(34,197,94,0.25)":d1Status==="LOCAL ONLY"?"rgba(245,158,11,0.25)":K.cb) }}>{d1Status==="SYNCED"?"D1 SYNCED":d1Status==="LOCAL ONLY"?"LOCAL ONLY":"..."}</span>
        </div>
        <div style={{ display:"flex", background:K.ib, borderRadius:6, border:"1px solid "+K.ibr, overflow:"hidden" }}>
          {[["CONFIG","CONFIG"],["SCAN","SCANNER"],["NEW","NEW TRADE"],["DASH","DASHBOARD"]].map(([k,l]) => (
            <button key={k} onClick={() => { setMode(k); if (k!=="DASH") setOpenPos(null); }}
              style={{ padding:"7px 16px", background:mode===k?K.a:"transparent", color:mode===k?K.w:K.td, border:"none", fontFamily:M, fontSize:10, fontWeight:700, cursor:"pointer", letterSpacing:1 }}>{l}</button>
          ))}
        </div>
      </div>

      {/* CONFIG */}
      {mode === "CONFIG" && (
        <div className="fade-in" style={{ maxWidth:620, margin:"0 auto", padding:"24px 16px", display:"flex", flexDirection:"column", gap:16 }}>
          <Cd>
            <Lb t="CONFIGURATION" />
            <div style={{ fontSize:10, fontFamily:M, color:K.tm, opacity:0.55, lineHeight:1.6 }}>
              Session-gated workflow: enter Today VIX once. Yesterday VIX auto-populates from last session. NEW TRADE uses session VIX values (no manual VIX inputs).
            </div>
            <Inp label="AUM" value={draft.aum} onChange={v=>editCfg("aum",v)} sfx="$" ph="100000" />
            <Inp label="CSP RoR_30 (credit/strike at 30 DTE)" value={draft.ror30} onChange={v=>editCfg("ror30",v)} sfx="dec" ph="0.04" />
            <Inp label="PCS RoR_30 (credit/maxLoss at 30 DTE)" value={draft.pcsRor30} onChange={v=>editCfg("pcsRor30",v)} sfx="dec" ph="0.20" />
            <div style={{ display:"flex", gap:10 }}>
              <Inp label="Max PCS risk % of AUM" value={draft.maxBpsRiskPct} onChange={v=>editCfg("maxBpsRiskPct",v)} sfx="dec" ph="0.02" />
              <Inp label="Max CSP notional % of AUM" value={draft.maxCspNotionalPct} onChange={v=>editCfg("maxCspNotionalPct",v)} sfx="dec" ph="0.25" />
            </div>
            <div style={{ display:"flex", gap:10 }}>
              <Inp label="Max deployment % of AUM" value={draft.maxDeploymentPct} onChange={v=>editCfg("maxDeploymentPct",v)} sfx="dec" ph="0.80" />
              <Inp label="Dashboard refresh (sec)" value={draft.refreshSec} onChange={v=>editCfg("refreshSec",v)} sfx="s" ph="60" />
            </div>
            <Cd st={{ background:"rgba(6,182,212,0.05)", border:"1px solid "+K.cyB }}>
              <Lb t="DAILY SESSION VIX" />
              <div style={{ fontSize:10, fontFamily:M, color:K.tm, opacity:0.7, lineHeight:1.5 }}>Date: {todayLocalYMD()} | Saved: {savedCfg.sessionLockedAt ? fmtTime(savedCfg.sessionLockedAt) : "-"}</div>
              <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
                <Inp label="Today VIX" value={draft.sessionVix} onChange={v=>editCfg("sessionVix",v)} ph="19.8" />
                <Inp label="Yesterday VIX (auto)" value={draft.sessionVixY} onChange={v=>editCfg("sessionVixY",v)} ph="auto" />
              </div>
              <div style={{ fontFamily:M, fontSize:10, color:K.tm, opacity:0.7 }}>
                Rule: if last saved sessionDate == yesterday, sessionVixY = last sessionVix.
              </div>
            </Cd>
            <button onClick={commitCfg} style={{ padding:"14px 0", background:cfgDirty?K.g:K.a, border:"none", borderRadius:8, color:cfgDirty?"#000":K.w, fontFamily:M, fontSize:14, fontWeight:900, letterSpacing:2, cursor:"pointer", opacity:cfgDirty?1:0.7 }}>
              {cfgDirty ? "SAVE CONFIG" : "CONFIG SAVED"}
            </button>
            {cfgMsg && <div style={{ fontSize:11, fontFamily:M, color:cfgMsg.includes("SAVED")?K.g:K.r, textAlign:"center" }}>{cfgMsg}</div>}
          </Cd>
        </div>
      )}

      {/* SCAN */}
      {mode === "SCAN" && (
        <div className="fade-in" style={{ maxWidth:1250, margin:"0 auto", padding:"18px 14px", display:"flex", flexDirection:"column", gap:12 }}>
          <Cd>
            <div style={{ display:"flex", justifyContent:"space-between", gap:10, flexWrap:"wrap", alignItems:"center" }}>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <Lb t="SCANNER / WATCHLIST" />
                {sessionReady && <Pill text={regime(sessionVix)} col={RC[regime(sessionVix)].col} bg={RC[regime(sessionVix)].bg} />}
              </div>
              <div style={{ display:"flex", gap:8, alignItems:"center" }}>
                <span style={{ fontFamily:M, fontSize:10, color:K.tm, opacity:0.75 }}>{scanMsg||"-"}</span>
                <button onClick={refreshWatch} style={{ padding:"10px 14px", background:scanLoading?K.sf:K.a, border:"none", borderRadius:8, color:scanLoading?K.tm:K.w, fontFamily:M, fontSize:11, fontWeight:900, letterSpacing:1, cursor:scanLoading?"wait":"pointer" }}>{scanLoading?"REFRESHING...":"REFRESH"}</button>
              </div>
            </div>
            <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
              <input value={watchInput} onChange={e=>setWatchInput(e.target.value.toUpperCase())} onKeyDown={e=>e.key==="Enter"&&addToWatch()} placeholder="Add tickers: SPY QQQ IBIT TQQQ..." style={{ flex:1, minWidth:240, padding:"10px 12px", background:K.ib, border:"1px solid "+K.ibr, borderRadius:6, color:K.w, fontFamily:M, fontSize:13, fontWeight:900, outline:"none", letterSpacing:1 }} />
              <button onClick={addToWatch} style={{ padding:"10px 14px", background:K.g, border:"none", borderRadius:8, color:"#000", fontFamily:M, fontSize:11, fontWeight:900, letterSpacing:1, cursor:"pointer" }}>ADD</button>
              <button onClick={clearWatch} style={{ padding:"10px 14px", background:"rgba(239,68,68,0.10)", border:"1px solid rgba(239,68,68,0.35)", borderRadius:8, color:K.r, fontFamily:M, fontSize:11, fontWeight:900, letterSpacing:1, cursor:"pointer" }}>CLEAR ALL</button>
            </div>
            {!sessionReady && <div style={{ fontFamily:M, fontSize:10, color:K.r }}>Set Today VIX in CONFIG to enable signal detection.</div>}
          </Cd>
          <Cd>
            <Lb t="TICKERS" />
            {watch.length===0 ? <div style={{ fontFamily:M, fontSize:11, color:K.tm, opacity:0.75 }}>No watchlist tickers. Add tickers above.</div> : (
              <div style={{ overflowX:"auto" }}>
                <table style={{ width:"100%", borderCollapse:"collapse", fontFamily:M, fontSize:11 }}>
                  <thead><tr style={{ color:K.tm, textTransform:"uppercase", letterSpacing:1 }}>
                    {["Ticker","Spot","RV10","RV20","RV10>RV20","Ref Spot","Drop vs Ref","Signal / σ","Updated","Actions"].map(h=><th key={h} style={{ textAlign:"left", padding:"10px 8px", borderBottom:"1px solid "+K.cb, whiteSpace:"nowrap" }}>{h}</th>)}
                  </tr></thead>
                  <tbody>{watch.map(w=>{
                    const spt=w.last?.spot,rv10x=w.last?.rv10,rv20x=w.last?.rv20;
                    const expanding=rvExpanding(rv10x,rv20x);
                    const drop=pctDrop(w.refSpot,spt);
                    const iv20x=w.last?.iv20??null;
                    const sig=signalTier({refSpot:w.refSpot,spot:spt,iv20:iv20x,rv10:rv10x,rv20:rv20x,vix:sessionReady?sessionVix:null});
                    return (<tr key={w.ticker} style={{ borderBottom:"1px solid "+K.cb, color:K.td }}>
                      <td style={{ padding:"10px 8px", fontWeight:900, color:K.w }}>{w.ticker}</td>
                      <td style={{ padding:"10px 8px" }}>{ok(spt)?"$"+spt.toFixed(2):(w.last?.spotError?<span style={{color:K.r,fontSize:9}}>ERR</span>:"-")}</td>
                      <td style={{ padding:"10px 8px" }}>{ok(rv10x)?(rv10x*100).toFixed(2)+"%":"-"}</td>
                      <td style={{ padding:"10px 8px" }}>{ok(rv20x)?(rv20x*100).toFixed(2)+"%":"-"}</td>
                      <td style={{ padding:"10px 8px", color:expanding?K.g:K.tm, fontWeight:900 }}>{ok(rv10x)&&ok(rv20x)?(expanding?"YES":"NO"):"-"}</td>
                      <td style={{ padding:"10px 8px" }}>
                        <input value={ok(w.refSpot)?String(w.refSpot):""} onChange={e=>setWatchRefSpot(w.ticker,e.target.value)} placeholder="yday close" style={{ width:110, padding:"7px 8px", background:K.ib, border:"1px solid "+K.ibr, borderRadius:6, color:K.w, fontFamily:M, fontSize:11, outline:"none" }} />
                      </td>
                      <td style={{ padding:"10px 8px", color:ok(drop)&&drop<0?K.g:ok(drop)&&drop>0?K.r:K.tm, fontWeight:900 }}>{ok(drop)?(drop*100).toFixed(2)+"%":"-"}</td>
                      <td style={{ padding:"10px 8px", whiteSpace:"nowrap" }}>
                        <span style={{ padding:"3px 8px", borderRadius:6, fontWeight:900, color:sig.col, background:sig.bg, border:"1px solid "+sig.br }}>{sig.label}</span>
                        <span style={{ marginLeft:8, fontSize:10, color:K.tm }}>{ok(sig.ds)?sig.ds.toFixed(2)+"σ":""}</span>
                      </td>
                      <td style={{ padding:"10px 8px", whiteSpace:"nowrap" }}>{fmtTime(w.asOf)}</td>
                      <td style={{ padding:"10px 8px", whiteSpace:"nowrap" }}>
                        <button onClick={()=>{
                          const pkt={_nuvo:"ANALYST_PACKET",ticker:w.ticker,spot:ok(w.last?.spot)?Number(w.last.spot):null,tf:"SCAN",barCount:0,
                            briefTimestamp:new Date().toISOString(),
                            verdict:{grade:"-",verdict:"ROUTED",color:K.cy,total:0,trendPts:0,momPts:0,mrPts:0},
                            supports:[],briefHtml:"<div style=\"opacity:.9\">Routed from SCANNER. Load full TA packet via clipboard import for richer brief.</div>"};
                          if(pkt.spot==null){setScanMsg("ROUTE FAIL: missing spot");return;}
                          savePendingPacket(pkt);setMode("NEW");setScanMsg("ROUTED → NEW TRADE");
                        }} style={{ padding:"7px 10px", background:K.iceD, border:"1px solid "+K.iceBr, borderRadius:8, color:K.ice, fontFamily:M, fontSize:10, fontWeight:900, cursor:"pointer", marginRight:6 }}>ROUTE</button>
                        <button onClick={()=>removeFromWatch(w.ticker)} style={{ padding:"7px 10px", background:"rgba(239,68,68,0.10)", border:"1px solid rgba(239,68,68,0.35)", borderRadius:8, color:K.r, fontFamily:M, fontSize:10, fontWeight:900, cursor:"pointer" }}>REMOVE</button>
                      </td>
                    </tr>);
                  })}</tbody>
                </table>
              </div>
            )}
          </Cd>
        </div>
      )}

      {/* NEW TRADE */}
      {mode === "NEW" && (
        <div className="fade-in" style={{ maxWidth:1150, margin:"0 auto", padding:"18px 14px", display:"flex", flexDirection:"column", gap:16 }}>

          {/* ═══ ANALYST PACKET IMPORT BAR ═══ */}
          <div style={{ display:"flex", gap:10, alignItems:"center", flexWrap:"wrap" }}>
            <button onClick={importAnalystPacket}
              style={{ padding:"12px 22px", background:analystPkt?"rgba(136,170,204,0.08)":K.ice, border:analystPkt?"1px solid "+K.iceBr:"none", borderRadius:8, color:analystPkt?K.ice:"#000", fontFamily:M, fontSize:11, fontWeight:900, letterSpacing:1.5, cursor:"pointer" }}>
              {analystPkt ? "◈ RE-IMPORT PACKET" : "◈ IMPORT ANALYST PACKET"}
            </button>
            {analystMsg && (
              <span style={{ fontFamily:M, fontSize:10, fontWeight:700, color:analystMsg.startsWith("IMPORTED")?K.g:K.r, letterSpacing:0.5 }}>
                {analystMsg}
              </span>
            )}
            {!analystPkt && <span style={{ fontFamily:M, fontSize:9, color:K.tm, opacity:0.6 }}>Paste clipboard from TA Terminal → ROUTE TO DESK</span>}
          </div>

          {/* ═══ ANALYST REPORT PANEL ═══ */}
          {analystPkt && <AnalystPanel pkt={analystPkt} onClear={clearAnalystPacket} />}

          {/* ═══ TWO-COLUMN TRADE BUILDER ═══ */}
          <div style={{ display:"flex", gap:18, flexWrap:"wrap" }}>
            {/* LEFT COLUMN */}
            <div style={{ flex:"1 1 390px", minWidth:320, display:"flex", flexDirection:"column", gap:13 }}>
              <div className="pulse-border" style={{ background:"rgba(34,197,94,0.04)", border:"1px solid rgba(34,197,94,0.18)", borderRadius:10, padding:"14px 17px", display:"flex", flexDirection:"column", gap:10 }}>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                  <span style={{ fontSize:10, fontFamily:M, color:K.g, letterSpacing:1.5, fontWeight:900 }}>LIVE SNAPSHOT</span>
                  <span style={{ fontSize:8.5, fontFamily:M, color:K.tm, opacity:0.6 }}>SPOT + RV</span>
                </div>
                <div style={{ display:"flex", gap:8 }}>
                  <input type="text" value={ticker} onChange={e=>setTicker(e.target.value.toUpperCase())} onKeyDown={e=>e.key==="Enter"&&handleLoadSnapshot()} placeholder="SPY, QQQ, IBIT..."
                    style={{ flex:1, padding:"10px 12px", background:K.ib, border:"1px solid "+K.ibr, borderRadius:6, color:K.w, fontFamily:M, fontSize:15, fontWeight:900, outline:"none", letterSpacing:2 }} />
                  <button onClick={handleLoadSnapshot} disabled={snapLoading||!ticker.trim()}
                    style={{ padding:"10px 18px", background:snapLoading?K.sf:K.g, border:"none", borderRadius:6, color:snapLoading?K.tm:"#000", fontFamily:M, fontSize:11, fontWeight:900, letterSpacing:1, cursor:snapLoading?"wait":"pointer", opacity:!ticker.trim()||snapLoading?0.5:1, whiteSpace:"nowrap" }}>
                    {snapLoading?"...":"LOAD"}
                  </button>
                </div>
                {snapMsg && <div style={{ fontSize:10, fontFamily:M, color:snapMsg.includes("failed")?K.r:K.g, opacity:0.9, wordBreak:"break-word" }}>{snapMsg}</div>}
              </div>

              <Cd>
                <Lb t="SESSION VIX (FROM CONFIG)" />
                <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
                  <div style={{ flex:1, minWidth:160, background:K.sf, borderRadius:8, padding:"12px 14px", border:"1px solid "+K.cb }}>
                    <div style={{ fontFamily:M, fontSize:9, color:K.tm, letterSpacing:1 }}>TODAY VIX</div>
                    <div style={{ fontFamily:M, fontSize:18, fontWeight:900, color:sessionReady?K.cy:K.r, marginTop:6 }}>{sessionReady?sessionVix.toFixed(2):"NOT SET"}</div>
                  </div>
                  <div style={{ flex:1, minWidth:160, background:K.sf, borderRadius:8, padding:"12px 14px", border:"1px solid "+K.cb }}>
                    <div style={{ fontFamily:M, fontSize:9, color:K.tm, letterSpacing:1 }}>YESTERDAY VIX</div>
                    <div style={{ fontFamily:M, fontSize:18, fontWeight:900, color:sessionReady?K.cy:K.r, marginTop:6 }}>{sessionReady?sessionVixY.toFixed(2):"NOT SET"}</div>
                  </div>
                </div>
                {!sessionReady && <div style={{ fontFamily:M, fontSize:10, color:K.r }}>Go to CONFIG and save Today VIX.</div>}
              </Cd>

              <Cd><Lb t="TRADE STRATEGY" /><Tog opts={["CSP","PCS"]} val={structure} set={v=>{setStructure(v);setRes(null);setErr(null);}} /></Cd>

              <Cd>
                <Lb t="UNDERLYING" />
                <Inp label="Spot" value={spot} onChange={setSpot} sfx="$" ph="450.25" />
                <div style={{ display:"flex", gap:10 }}>
                  <div style={{ display:"flex", flexDirection:"column", gap:4, flex:1 }}>
                    <label style={{ fontSize:9.5, fontFamily:M, color:K.tm, letterSpacing:1.2, textTransform:"uppercase" }}>Expiry</label>
                    <input type="date" value={expiry} min={todayLocalYMD()} onChange={e=>handleExpiryChange(e.target.value)}
                      style={{ width:"100%", padding:"10px 12px", boxSizing:"border-box", background:K.ib, border:"1px solid "+K.ibr, borderRadius:6, color:K.tx, fontFamily:M, fontSize:14, outline:"none" }} />
                  </div>
                  <div style={{ width:90 }}><Inp label="DTE" value={dte} onChange={()=>{}} sfx="d" readOnly={true} /></div>
                </div>
              </Cd>

              <Cd>
                <Lb t="VOLATILITY" />
                <Inp label="Short Strike IV" value={iv} onChange={setIv} sfx="dec" ph="0.25" />
                <div style={{ display:"flex", gap:10 }}>
                  <Inp label="RV 10d" value={rv10} onChange={setRv10} sfx="dec" hl={rv10!==""} ph="0.18" />
                  <Inp label="RV 20d" value={rv20} onChange={setRv20} sfx="dec" hl={rv20!==""} ph="0.16" />
                </div>
              </Cd>
            </div>

            {/* RIGHT COLUMN */}
            <div style={{ flex:"1 1 520px", minWidth:320, display:"flex", flexDirection:"column", gap:13 }}>
              <Cd st={{ border:"1px solid "+(rec?K.cyB:K.cb), background:rec?K.cyD:K.card }}>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", gap:10, flexWrap:"wrap" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <Lb t={"RECOMMENDATION ("+structure+")"} />
                    {rec && <Pill text={rec.rg} col={RC[rec.rg].col} bg={RC[rec.rg].bg} />}
                  </div>
                  <div style={{ fontFamily:M, fontSize:10, color:K.tm, opacity:0.7 }}>VIX {sessionReady?sessionVix.toFixed(2):"NA"} | VIXy {sessionReady?sessionVixY.toFixed(2):"NA"}</div>
                </div>
                {!rec ? (
                  <div style={{ fontFamily:M, fontSize:11, color:K.tm, opacity:0.8 }}>{sessionReady?"Enter Spot, Expiry, DTE, and IV.":"Set today's VIX in CONFIG first."}</div>
                ) : rec.pcsErr ? (
                  <div style={{ fontFamily:M, fontSize:11, color:K.r }}>PCS width suggestion failed: {rec.pcsErr}{rec.riskCap?` | Risk Cap $${Number(rec.riskCap).toLocaleString()}`:""}</div>
                ) : (
                  <>
                    <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
                      {[["EXPECTED MOVE (1σ)","$"+rec.em.toFixed(2),K.cy,"Req Sigma "+rec.sig.toFixed(2)],
                        ["RECOMMENDED SHORT STRIKE","$"+rec.recStrike,K.w,"Raw $"+rec.rawStrike.toFixed(2)],
                        ["DTE-SCALED RoR MIN",(rec.rMin*100).toFixed(2)+"%",K.y,"rMin = r30*(DTE/30)"],
                        ["MIN CREDIT REQUIRED","$"+rec.minCredit.toFixed(2),K.y,"~$"+(rec.minCredit*100).toFixed(0)+"/ct"],
                      ].map(([lbl,val,clr,sub])=>(
                        <div key={lbl} style={{ flex:1, minWidth:170, background:K.sf, border:"1px solid "+K.cb, borderRadius:8, padding:"12px 14px" }}>
                          <div style={{ fontFamily:M, fontSize:9, color:K.tm, letterSpacing:1 }}>{lbl}</div>
                          <div style={{ fontFamily:M, fontSize:20, fontWeight:900, color:clr, marginTop:6 }}>{val}</div>
                          <div style={{ fontFamily:M, fontSize:9, color:K.tm, opacity:0.6, marginTop:3 }}>{sub}</div>
                        </div>
                      ))}
                    </div>
                    {structure==="PCS"&&rec.mode==="PCS"&&!rec.pcsErr && (
                      <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
                        <div style={{ flex:1, minWidth:170, background:K.sf, border:"1px solid "+K.cb, borderRadius:8, padding:"12px 14px" }}>
                          <div style={{ fontFamily:M, fontSize:9, color:K.tm, letterSpacing:1 }}>WIDTH (SUGGESTED)</div>
                          <div style={{ fontFamily:M, fontSize:20, fontWeight:900, color:K.cy, marginTop:6 }}>{rec.effWidth}{rec.autoWidth?" (auto)":""}</div>
                          <div style={{ fontFamily:M, fontSize:9, color:K.tm, opacity:0.6, marginTop:3 }}>Risk ${Number(rec.risk).toLocaleString()} / Cap ${Number(rec.riskCap).toLocaleString()}</div>
                        </div>
                        <div style={{ flex:1, minWidth:170, background:K.sf, border:"1px solid "+K.cb, borderRadius:8, padding:"12px 14px" }}>
                          <div style={{ fontFamily:M, fontSize:9, color:K.tm, letterSpacing:1 }}>LONG STRIKE (REC)</div>
                          <div style={{ fontFamily:M, fontSize:20, fontWeight:900, color:K.w, marginTop:6 }}>${rec.longStrike}</div>
                          <div style={{ fontFamily:M, fontSize:9, color:K.tm, opacity:0.6, marginTop:3 }}>Long = Short - Width</div>
                        </div>
                      </div>
                    )}
                    <button onClick={handleUseRec} style={{ padding:"10px 0", background:K.cyD, border:"1px solid "+K.cyB, borderRadius:8, color:K.cy, fontFamily:M, fontSize:11, fontWeight:900, letterSpacing:1.2, cursor:"pointer" }}>APPLY RECOMMENDATION TO INPUTS</button>
                  </>
                )}
              </Cd>

              <Cd>
                <Lb t="TRADE INPUTS" />
                <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
                  <Inp label="Short Strike" value={strike} onChange={setStrike} sfx="$" ph={rec?String(rec.recStrike):"475"} />
                  {structure==="PCS" && <Inp label="Width" value={width} onChange={setWidth} sfx="$" ph={rec&&rec.mode==="PCS"&&!rec.pcsErr?String(rec.effWidth):"2.5"} />}
                </div>
                <div style={{ display:"flex", gap:10 }}>
                  <Inp label="Credit" value={credit} onChange={setCredit} sfx="$" ph={rec?(rec.minCredit?.toFixed?rec.minCredit.toFixed(2):"0.50"):"0.50"} />
                  <Inp label="Contracts" value={contracts} onChange={setContracts} ph="1" />
                </div>

                <div style={{ background:gate.sev.bg, border:gate.sev.br, borderRadius:10, padding:"12px 14px", display:"flex", justifyContent:"space-between", alignItems:"center", gap:10, flexWrap:"wrap" }}>
                  <div>
                    <div style={{ fontFamily:M, fontSize:11, fontWeight:900, color:gate.sev.col, letterSpacing:1.5 }}>{gate.title}</div>
                    <div style={{ fontFamily:M, fontSize:10, color:K.tm, opacity:0.75, marginTop:3 }}>{gate.subtitle}</div>
                  </div>
                  <div style={{ display:"flex", gap:8 }}>
                    <button onClick={clearAllFields} style={{ padding:"10px 14px", background:"rgba(239,68,68,0.10)", border:"1px solid rgba(239,68,68,0.35)", borderRadius:8, color:K.r, fontFamily:M, fontSize:11, fontWeight:900, letterSpacing:1, cursor:"pointer" }}>CLEAR</button>
                    <button onClick={handleEval} style={{ padding:"10px 14px", background:K.a, border:"none", borderRadius:8, color:K.w, fontFamily:M, fontSize:11, fontWeight:900, letterSpacing:1, cursor:"pointer" }}>EVALUATE</button>
                    <button onClick={saveToDash} style={{ padding:"10px 14px", background:K.g, border:"none", borderRadius:8, color:"#000", fontFamily:M, fontSize:11, fontWeight:900, letterSpacing:1, cursor:"pointer" }}>ADD TO DASH</button>
                  </div>
                </div>
                {err && <div style={{ fontFamily:M, fontSize:11, color:K.r }}>{err}</div>}
              </Cd>
            </div>
          </div>
        </div>
      )}

      {/* DASH */}
      {mode === "DASH" && (
        <div className="fade-in" style={{ maxWidth:1250, margin:"0 auto", padding:"18px 14px", display:"flex", flexDirection:"column", gap:12 }}>
          <Cd>
            <div style={{ display:"flex", justifyContent:"space-between", gap:10, flexWrap:"wrap", alignItems:"center" }}>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <Lb t="DASHBOARD TOTALS" />
                <span style={{ fontFamily:M, fontSize:10, color:K.tm, opacity:0.75 }}>Last refresh {dashLiveMsg||"-"}</span>
              </div>
              <button onClick={refreshDashboardLive} style={{ padding:"10px 14px", background:dashRefreshing?K.sf:K.a, border:"none", borderRadius:8, color:dashRefreshing?K.tm:K.w, fontFamily:M, fontSize:11, fontWeight:900, letterSpacing:1, cursor:dashRefreshing?"wait":"pointer", opacity:dashRefreshing?0.7:1 }}>{dashRefreshing?"REFRESHING...":"REFRESH NOW"}</button>
            </div>
            <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
              {[["AUM",totals.aum?"$"+totals.aum.toLocaleString():"-"],["CSP COLLATERAL","$"+totals.cspCollateral.toLocaleString()],["PCS RISK","$"+totals.pcsRisk.toLocaleString()],["DEPLOYED","$"+totals.deployed.toLocaleString()],["DEPLOYED %",(totals.deployedPct*100).toFixed(1)+"%"],["PREMIUM (ENTRY)","$"+totals.premiumCollected.toLocaleString()]].map(([n,v])=>(
                <div key={n} style={{ flex:1, minWidth:170, background:K.sf, borderRadius:8, padding:"12px 14px", border:"1px solid "+K.cb }}>
                  <div style={{ fontFamily:M, fontSize:9, color:K.tm, letterSpacing:1 }}>{n}</div>
                  <div style={{ fontFamily:M, fontSize:18, fontWeight:900, color:n.includes("DEPLOYED %")?(totals.deployedPct>=parseFloat(savedCfg.maxDeploymentPct||"0.80")?K.r:totals.deployedPct>=0.70?K.y:K.g):K.cy, marginTop:6 }}>{v}</div>
                </div>
              ))}
            </div>
          </Cd>

          <Cd>
            <Lb t="OPEN POSITIONS" />
            {positions.length===0 ? <div style={{ fontFamily:M, fontSize:11, color:K.tm, opacity:0.75 }}>No positions saved.</div> : (
              <div style={{ overflowX:"auto" }}>
                <table style={{ width:"100%", borderCollapse:"collapse", fontFamily:M, fontSize:11 }}>
                  <thead><tr style={{ color:K.tm, textTransform:"uppercase", letterSpacing:1 }}>
                    {["Time","Ticker","Type","Expiry","DTE","Strike","Width","Credit","Ct","Live Spot","Live IV","Δ","PoP","Sigma","Status","Capital","Updated","Actions"].map(h=><th key={h} style={{ textAlign:"left", padding:"10px 8px", borderBottom:"1px solid "+K.cb, whiteSpace:"nowrap" }}>{h}</th>)}
                  </tr></thead>
                  <tbody>{positions.map(p=>{
                    const live=p.live||{};
                    const S=ok(live.spot)?live.spot:p.entry.spot;
                    const IV=ok(live.shortIv)?live.shortIv:p.entry.iv;
                    const D=parseInt(computeDTE(p.identifiers?.expiry||""),10);
                    const out=evaluateTrade({structure:p.str,spot:String(S),iv:String(IV),dte:String(D),strike:String(p.entry.strike),width:p.str==="PCS"?String(p.entry.width):null,credit:String(p.entry.credit),contracts:String(p.entry.contracts||1),vix:String(sessionVix),vixY:String(sessionVixY),rv10:String(ok(live.rv10)?live.rv10:p.entry.rv10),rv20:String(ok(live.rv20)?live.rv20:p.entry.rv20)},savedCfg,positions);
                    const st=(out&&!out.error)?positionStatus({dte:D,sigma:out.sigmaDistance,reqSigma:out.reqSigma,pop:out.pop,spot:S,breakEven:out.breakEven}):{label:"AWAITING",color:K.tm,action:"ENTER DATA"};
                    const cap=p.str==="CSP"?(Number(p.entry.strike)*100*(Number(p.entry.contracts)||1)):((Number(p.entry.width)-Number(p.entry.credit))*100*(Number(p.entry.contracts)||1));
                    return (<tr key={p.id} style={{ borderBottom:"1px solid "+K.cb, color:K.td }}>
                      <td style={{ padding:"10px 8px", whiteSpace:"nowrap" }}>{fmtDate(p.ts)} {fmtTime(p.ts)}</td>
                      <td style={{ padding:"10px 8px", fontWeight:900, color:K.w }}>{p.ticker}</td>
                      <td style={{ padding:"10px 8px", color:p.str==="CSP"?K.cy:K.a, fontWeight:900 }}>{p.str}</td>
                      <td style={{ padding:"10px 8px", whiteSpace:"nowrap" }}>{p.identifiers?.expiry||"-"}</td>
                      <td style={{ padding:"10px 8px", color:ok(D)&&D<=0?K.r:K.td }}>{ok(D)?D:"-"}</td>
                      <td style={{ padding:"10px 8px" }}>${Number(p.entry.strike).toFixed(2)}</td>
                      <td style={{ padding:"10px 8px" }}>{p.str==="PCS"?Number(p.entry.width).toFixed(2):"-"}</td>
                      <td style={{ padding:"10px 8px" }}>${Number(p.entry.credit).toFixed(2)}</td>
                      <td style={{ padding:"10px 8px" }}>{p.entry.contracts}</td>
                      <td style={{ padding:"10px 8px" }}>${Number(S).toFixed(2)}</td>
                      <td style={{ padding:"10px 8px" }}>{ok(IV)?(IV*100).toFixed(1)+"%":"-"}</td>
                      <td style={{ padding:"10px 8px" }}>{ok(live.shortDelta)?live.shortDelta.toFixed(2):"-"}</td>
                      <td style={{ padding:"10px 8px", color:ok(out?.pop)?(out.pop>=0.7?K.g:out.pop>=0.6?K.a:K.r):K.tm }}>{ok(out?.pop)?(out.pop*100).toFixed(1)+"%":"-"}</td>
                      <td style={{ padding:"10px 8px", color:ok(out?.sigmaDistance)?(out.sigmaDistance>=out.reqSigma?K.g:K.r):K.tm }}>{ok(out?.sigmaDistance)?out.sigmaDistance.toFixed(2):"-"}</td>
                      <td style={{ padding:"10px 8px" }}><span style={{ padding:"3px 8px", borderRadius:6, fontWeight:900, color:st.color, background:"rgba(255,255,255,0.03)", border:"1px solid "+K.cb }}>{st.label} · {st.action}</span></td>
                      <td style={{ padding:"10px 8px", whiteSpace:"nowrap" }}>${Number(cap).toLocaleString()}</td>
                      <td style={{ padding:"10px 8px", whiteSpace:"nowrap" }}>MKT {fmtTime(live.asOf)} | OPT {fmtTime(live.optAsOf)}</td>
                      <td style={{ padding:"10px 8px", whiteSpace:"nowrap" }}>
                        <button onClick={()=>analyzePos(p)} style={{ padding:"7px 10px", background:K.sf, border:"1px solid "+K.cb, borderRadius:8, color:K.w, fontFamily:M, fontSize:10, fontWeight:900, cursor:"pointer", marginRight:6 }}>ANALYZE</button>
                        <button onClick={()=>deletePos(p.id)} style={{ padding:"7px 10px", background:"rgba(239,68,68,0.10)", border:"1px solid rgba(239,68,68,0.35)", borderRadius:8, color:K.r, fontFamily:M, fontSize:10, fontWeight:900, cursor:"pointer" }}>DELETE</button>
                      </td>
                    </tr>);
                  })}</tbody>
                </table>
              </div>
            )}
          </Cd>

          {openPos && (
            <div onClick={()=>setOpenPos(null)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.55)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:9999, padding:12 }}>
              <div onClick={e=>e.stopPropagation()} className="fade-in" style={{ width:"min(1050px,100%)", background:K.card, border:"1px solid "+K.cb, borderRadius:14, padding:16 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", gap:10, flexWrap:"wrap" }}>
                  <div style={{ display:"flex", alignItems:"baseline", gap:10 }}>
                    <span style={{ fontFamily:M, fontSize:14, fontWeight:900, color:K.w, letterSpacing:1.5 }}>{openPos.ticker}</span>
                    <span style={{ fontFamily:M, fontSize:12, fontWeight:900, color:openPos.str==="CSP"?K.cy:K.a }}>{openPos.str}</span>
                    <span style={{ fontFamily:M, fontSize:10, color:K.tm }}>{openPos.identifiers?.expiry}</span>
                  </div>
                  <button onClick={()=>setOpenPos(null)} style={{ padding:"9px 12px", background:K.sf, border:"1px solid "+K.cb, borderRadius:10, color:K.w, fontFamily:M, fontSize:11, fontWeight:900, cursor:"pointer" }}>CLOSE</button>
                </div>
                {!openEval ? <div style={{ marginTop:12, fontFamily:M, fontSize:11, color:K.tm }}>Insufficient live data to evaluate.</div> : (
                  <div style={{ marginTop:12, display:"flex", gap:10, flexWrap:"wrap" }}>
                    {[["STATUS",openStatus.label+" · "+openStatus.action,openStatus.color,"DTE "+openEval.dteLive],
                      ["LIVE SPOT / IV / Δ","$"+openEval.spotLive.toFixed(2),K.w,"IV "+(ok(openEval.ivLive)?(openEval.ivLive*100).toFixed(1)+"%":"-")+" | Δ "+(ok(openPos.live?.shortDelta)?openPos.live.shortDelta.toFixed(2):"-")],
                      ["PoP / SIGMA",ok(openEval.pop)?(openEval.pop*100).toFixed(1)+"%":"-",ok(openEval.pop)?(openEval.pop>=0.7?K.g:openEval.pop>=0.6?K.a:K.r):K.tm,"σ "+openEval.sigmaDistance.toFixed(2)+" (req "+openEval.reqSigma.toFixed(2)+")"],
                      ["BREAK-EVEN","$"+openEval.breakEven.toFixed(2),K.w,"Cushion "+(openEval.cushionPct*100).toFixed(2)+"%"],
                    ].map(([lbl,val,clr,sub])=>(
                      <div key={lbl} style={{ flex:1, minWidth:200, background:K.sf, border:"1px solid "+K.cb, borderRadius:10, padding:12 }}>
                        <div style={{ fontFamily:M, fontSize:9, color:K.tm, letterSpacing:1 }}>{lbl}</div>
                        <div style={{ fontFamily:M, fontSize:18, fontWeight:900, color:clr, marginTop:6 }}>{val}</div>
                        <div style={{ fontFamily:M, fontSize:10, color:K.tm, opacity:0.75, marginTop:4 }}>{sub}</div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("desk-app")).render(<App />);

</script>

</body>
</html>

function switchMaster(target) {
  document.querySelectorAll('.app-container').forEach(el => el.classList.remove('visible'));
  document.querySelectorAll('.master-tab').forEach(el => el.classList.remove('active'));
  const container = document.getElementById(target);
  if (container) container.classList.add('visible');
  const tab = document.querySelector('.master-tab[data-target="'+target+'"]');
  if (tab) tab.classList.add('active');
}

<!-- ═══ TA TERMINAL v10.2 ═══ -->
<script>
(function(){
/* ═══════════════════════════════════════════════════════════════════════
   NUVO STRICT TA v10.2 — Definitive Build
   Merged from parcels 1-5 with v10.2 math fixes applied:
   ✓ NY-bucketed 4H aggregation (aggregate4hNY)
   ✓ Index-aligned MACD (no length drift)
   ✓ Proper Normal CDF + BS put delta
   ✓ Division-by-zero guard in accumDist
   ✓ Enhanced analyze() with suggestStrikes + recommendedLevel
   ✓ Complete render tail (MAs, oscillators, S/R, volume, fibs, strikes)
   ═══════════════════════════════════════════════════════════════════════ */

// ── State ──────────────────────────────────────────────────────────────
const S = {
  sym:"QQQ", tf:"daily", bars:null, loading:false, error:null,
  lastUpdate:null, autoRefresh:true, showSettings:false,
  dte:14, iv:0.25, fibLookback:260, pivLR:5, clusterTol:0.5,
};
let refreshTimer=null;

// ── Helpers ────────────────────────────────────────────────────────────
const f2=x=>x==null||isNaN(x)?"—":Number(x).toFixed(2);
const f1=x=>x==null||isNaN(x)?"—":Number(x).toFixed(1);
const fm=x=>{if(x==null||isNaN(x))return"—";const n=+x;return n>=1000?"$"+Math.round(n).toLocaleString():"$"+n.toFixed(2);};
const pct=x=>x==null||isNaN(x)?"—":(x*100).toFixed(2)+"%";
const pct1=x=>x==null||isNaN(x)?"—":(x*100).toFixed(1)+"%";
const esc=s=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const finite=x=>typeof x==="number"&&Number.isFinite(x);
const nz=(x,fb=null)=>finite(x)?x:fb;

function isMarketOpen(){
  const now=new Date();
  const et=new Date(now.toLocaleString("en-US",{timeZone:"America/New_York"}));
  const day=et.getDay();
  if(day===0||day===6)return false;
  const m=et.getHours()*60+et.getMinutes();
  return m>=570&&m<=960;
}

// ── Math: Normal CDF (Abramowitz & Stegun) ─────────────────────────────
function erfApprox(x){
  const sign=x<0?-1:1; x=Math.abs(x);
  const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
  const t=1/(1+p*x);
  const y=1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);
  return sign*y;
}
function normCdf(x){ return 0.5*(1+erfApprox(x/Math.SQRT2)); }

// ── Fetch with timeout ────────────────────────────────────────────────
async function fetchWithTimeout(url, ms=12000) {
  const ctrl = new AbortController();
  const id = setTimeout(() => ctrl.abort(), ms);
  try { return await fetch(url, { cache:"no-store", signal: ctrl.signal }); }
  finally { clearTimeout(id); }
}

// ── Worker-primary bar fetch ──────────────────────────────────────────
const WORKER = "https://nuvo-proxy.yulgutierrez.workers.dev";

async function fetchBars(sym, tf) {
  const s = sym.trim().toUpperCase();
  if (!s) return [];

  const url = `${WORKER}/v1/bars?ticker=${encodeURIComponent(s)}&tf=${tf}&ts=${Date.now()}`;
  console.log("→ Fetching from worker:", url);

  try {
    const res = await fetchWithTimeout(url, 12000);
    console.log("← Worker status:", res.status, res.statusText);

    if (!res.ok) {
      const txt = await res.text().catch(()=>"(no text)");
      console.warn("Worker HTTP error:", res.status, txt);
      throw new Error(`HTTP ${res.status}`);
    }

    const json = await res.json();
    console.log("Worker JSON keys:", Object.keys(json));
    console.log("Worker bars type:", typeof json.bars, "isArray:", Array.isArray(json.bars), "length:", json.bars?.length);

    if (!json || !Array.isArray(json.bars) || json.bars.length === 0) {
      console.warn("Invalid bars format — bars is", json?.bars);
      throw new Error("No valid bars array");
    }

    const bars = json.bars.map(b => ({
      t: +b.t, o: +b.o, h: +b.h, l: +b.l, c: +b.c, v: +(b.v || 0)
    })).filter(b => isFinite(b.o) && isFinite(b.c) && isFinite(b.t));

    console.log(`✓ Got ${bars.length} valid bars from worker`);
    if (bars.length >= 50) return bars;

    console.warn("Too few bars from worker:", bars.length);
  } catch (e) {
    console.error("✗ Worker fetch failed:", e.message);
  }

  console.warn("⚠ Falling back to Yahoo for", s);
  return fetchYahooFallback(s, tf);
}

async function fetchYahooFallback(sym, tf) {
  let interval, range;
  if (tf === "1h") { interval = "1h"; range = "2y"; }
  else if (tf === "4h") { interval = "1h"; range = "2y"; }
  else { interval = "1d"; range = "5y"; }
  const base = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=${interval}&range=${range}&includePrePost=false`;
  const proxies = [
    u => `https://corsproxy.io/?url=${encodeURIComponent(u)}`,
    u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  ];
  let lastErr;
  for (const wrap of proxies) {
    try {
      const res = await fetchWithTimeout(wrap(base), 12000);
      if (!res.ok) throw new Error("HTTP " + res.status);
      const json = await res.json();
      const result = json?.chart?.result?.[0];
      if (!result) throw new Error("No chart data");
      const ts = result.timestamp || [];
      const q = result.indicators?.quote?.[0] || {};
      const bars = [];
      for (let i = 0; i < ts.length; i++) {
        const o = q.open?.[i], h = q.high?.[i], l = q.low?.[i], c = q.close?.[i], v = q.volume?.[i];
        if (o != null && h != null && l != null && c != null)
          bars.push({ t: ts[i] * 1000, o: +o, h: +h, l: +l, c: +c, v: +(v || 0) });
      }
      if (bars.length < 50) throw new Error("Only " + bars.length + " bars");
      if (tf === "4h") return aggregate4hNY(bars);
      return bars;
    } catch (e) { lastErr = e; continue; }
  }
  throw lastErr || new Error("All sources failed");
}

// ── 4H aggregation (Intl-based NY timezone — DST safe) ────────────────
function nyParts(ms) {
  const d = new Date(ms);
  const fmt = new Intl.DateTimeFormat("en-US", {
    timeZone: "America/New_York",
    year: "numeric", month: "2-digit", day: "2-digit",
    hour: "2-digit", minute: "2-digit", hour12: false,
  });
  const parts = Object.fromEntries(fmt.formatToParts(d).map(p => [p.type, p.value]));
  return { y: +parts.year, m: +parts.month, d: +parts.day, h: +parts.hour };
}

function aggregate4hNY(b1h) {
  const g = {};
  for (const b of b1h) {
    const ny = nyParts(b.t);
    const bucket = Math.floor(ny.h / 4) * 4;
    const k = `${ny.y}-${String(ny.m).padStart(2,"0")}-${String(ny.d).padStart(2,"0")}-${bucket}`;
    if (!g[k]) g[k] = { t: b.t, o: b.o, h: b.h, l: b.l, c: b.c, v: b.v };
    else { const x = g[k]; x.h = Math.max(x.h, b.h); x.l = Math.min(x.l, b.l); x.c = b.c; x.v += b.v; }
  }
  return Object.values(g).sort((a, b) => a.t - b.t);
}

// ── Indicators ─────────────────────────────────────────────────────────
function smaLast(data,p){
  if(data.length<p)return null;
  let s=0;for(let i=data.length-p;i<data.length;i++)s+=data[i];
  return s/p;
}

function emaArr(data,p){
  const r=new Array(data.length).fill(null);
  if(data.length<p)return r;
  let s=0;for(let i=0;i<p;i++)s+=data[i];
  r[p-1]=s/p;
  const k=2/(p+1);
  for(let i=p;i<data.length;i++)r[i]=data[i]*k+r[i-1]*(1-k);
  return r;
}

function emaLast(data,p){
  const a=emaArr(data,p);
  for(let i=a.length-1;i>=0;i--)if(a[i]!=null)return a[i];
  return null;
}

function computeRSIArray(closes,p){
  if(!p||p<2)p=14;
  const r=new Array(closes.length).fill(null);
  if(closes.length<p+1)return r;
  let gS=0,lS=0;
  for(let i=1;i<=p;i++){const d=closes[i]-closes[i-1];if(d>0)gS+=d;else lS-=d;}
  let ag=gS/p,al=lS/p;
  r[p]=al===0?100:100-100/(1+ag/al);
  for(let i=p+1;i<closes.length;i++){
    const d=closes[i]-closes[i-1];
    ag=(ag*(p-1)+(d>0?d:0))/p;
    al=(al*(p-1)+(d<0?-d:0))/p;
    r[i]=al===0?100:100-100/(1+ag/al);
  }
  return r;
}

function computeWillRArray(bars,p){
  if(!p||p<2)p=14;
  const r=new Array(bars.length).fill(null);
  for(let i=p-1;i<bars.length;i++){
    let hh=-Infinity,ll=Infinity;
    for(let j=i-p+1;j<=i;j++){if(bars[j].h>hh)hh=bars[j].h;if(bars[j].l<ll)ll=bars[j].l;}
    r[i]=hh===ll?-50:((hh-bars[i].c)/(hh-ll))*-100;
  }
  return r;
}

// FIX: Index-aligned MACD (v10.2 spec — no length drift)
function computeMACD(closes,fast,slow,sig){
  fast=fast||12;slow=slow||26;sig=sig||9;
  const ef=emaArr(closes,fast),es=emaArr(closes,slow);
  const lineArr=new Array(closes.length).fill(null);
  for(let i=0;i<closes.length;i++){
    if(ef[i]!=null&&es[i]!=null)lineArr[i]=ef[i]-es[i];
  }
  const compact=[],mapIdx=[];
  for(let i=0;i<lineArr.length;i++){if(lineArr[i]!=null){compact.push(lineArr[i]);mapIdx.push(i);}}
  if(compact.length<sig)return{line:lineArr[lineArr.length-1],signal:null,hist:null,histPrev:null};
  const sigCompact=emaArr(compact,sig);
  const signalArr=new Array(closes.length).fill(null);
  for(let j=0;j<sigCompact.length;j++){signalArr[mapIdx[j]]=sigCompact[j];}
  const histArr=new Array(closes.length).fill(null);
  for(let i=0;i<closes.length;i++){
    if(lineArr[i]!=null&&signalArr[i]!=null)histArr[i]=lineArr[i]-signalArr[i];
  }
  let L=null,P=null;
  for(let i=closes.length-1;i>=0;i--){if(histArr[i]!=null){L=i;break;}}
  if(L!=null){for(let i=L-1;i>=0;i--){if(histArr[i]!=null){P=i;break;}}}
  const line=L!=null?lineArr[L]:null;
  const signal=L!=null?signalArr[L]:null;
  const hist=L!=null?histArr[L]:null;
  const histPrev=P!=null?histArr[P]:null;
  return{line,signal,hist,histPrev};
}

function computeBollinger(closes,p,mult){
  p=p||20;mult=mult||2;
  if(closes.length<p)return{upper:null,mid:null,lower:null,pctB:null,bw:null};
  const sl=closes.slice(-p);
  const mid=sl.reduce((a,b)=>a+b,0)/p;
  const sd=Math.sqrt(sl.reduce((a,b)=>a+(b-mid)**2,0)/p);
  const upper=mid+mult*sd,lower=mid-mult*sd;
  const spot=closes[closes.length-1];
  return{upper,mid,lower,pctB:upper===lower?0.5:(spot-lower)/(upper-lower),bw:mid>0?(upper-lower)/mid:0};
}

function computeATR(bars,p){
  p=p||14;
  if(bars.length<p+1)return null;
  const trs=[];
  for(let i=1;i<bars.length;i++){
    trs.push(Math.max(bars[i].h-bars[i].l,Math.abs(bars[i].h-bars[i-1].c),Math.abs(bars[i].l-bars[i-1].c)));
  }
  if(trs.length<p)return null;
  let atr=trs.slice(0,p).reduce((a,b)=>a+b,0)/p;
  for(let i=p;i<trs.length;i++)atr=(atr*(p-1)+trs[i])/p;
  return atr;
}

// ── Rate of Change (ROC) — G5 Momentum Gate alignment ─────────────────
function computeROC(closes,p){
  p=p||14;
  if(closes.length<p+1)return null;
  const curr=closes[closes.length-1];
  const prev=closes[closes.length-1-p];
  return prev>0?(curr-prev)/prev:null;
}

// ── Expected Move (Market Maker 1σ) ────────────────────────────────────
function computeExpectedMove(spot,iv,dte){
  if(!(spot>0&&iv>0&&dte>0))return null;
  const em=spot*iv*Math.sqrt(dte/365);
  return{em:+em.toFixed(2),upper:+(spot+em).toFixed(2),lower:+(spot-em).toFixed(2),pct:+(em/spot).toFixed(4)};
}

// ── RSI Divergence ─────────────────────────────────────────────────────
function detectRSIDivergence(bars,rsiArr,lookback){
  lookback=lookback||30;
  const len=bars.length;
  if(len<lookback+5)return{bullish:false,bearish:false};
  const recent=Math.max(0,len-lookback);
  let priceLows=[],priceHighs=[];
  for(let i=recent+2;i<len-2;i++){
    if(bars[i].l<=bars[i-1].l&&bars[i].l<=bars[i-2].l&&bars[i].l<=bars[i+1].l&&bars[i].l<=bars[i+2].l)
      priceLows.push({idx:i,price:bars[i].l,rsi:rsiArr[i]});
    if(bars[i].h>=bars[i-1].h&&bars[i].h>=bars[i-2].h&&bars[i].h>=bars[i+1].h&&bars[i].h>=bars[i+2].h)
      priceHighs.push({idx:i,price:bars[i].h,rsi:rsiArr[i]});
  }
  let bullish=false;
  if(priceLows.length>=2){
    const a=priceLows[priceLows.length-2],b=priceLows[priceLows.length-1];
    if(b.price<a.price&&b.rsi!=null&&a.rsi!=null&&b.rsi>a.rsi)bullish=true;
  }
  let bearish=false;
  if(priceHighs.length>=2){
    const a=priceHighs[priceHighs.length-2],b=priceHighs[priceHighs.length-1];
    if(b.price>a.price&&b.rsi!=null&&a.rsi!=null&&b.rsi<a.rsi)bearish=true;
  }
  return{bullish,bearish};
}

// ── Trend Structure ────────────────────────────────────────────────────
function detectTrendStructure(bars,lookback){
  lookback=lookback||60;
  const len=bars.length;
  const start=Math.max(0,len-lookback);
  const swingH=[],swingL=[];
  for(let i=start+1;i<len-1;i++){
    if(bars[i].h>bars[i-1].h&&bars[i].h>bars[i+1].h)swingH.push({idx:i,level:bars[i].h});
    if(bars[i].l<bars[i-1].l&&bars[i].l<bars[i+1].l)swingL.push({idx:i,level:bars[i].l});
  }
  let lowerHighs=0,higherHighs=0;
  for(let i=1;i<swingH.length;i++){if(swingH[i].level<swingH[i-1].level)lowerHighs++;else higherHighs++;}
  let higherLows=0,lowerLows=0;
  for(let i=1;i<swingL.length;i++){if(swingL[i].level>swingL[i-1].level)higherLows++;else lowerLows++;}
  const recentBars=bars.slice(-lookback);
  const recentHigh=Math.max(...recentBars.map(b=>b.h));
  const recentLow=Math.min(...recentBars.map(b=>b.l));
  const spot=bars[len-1].c;
  const drawdownPct=(spot-recentHigh)/recentHigh;
  const bounceFromLow=(spot-recentLow)/recentLow;

  let structure,structColor;
  if(lowerHighs>=2&&lowerLows>=1){structure="DESCENDING";structColor="#ff2d55";}
  else if(higherLows>=2&&higherHighs>=1){structure="ASCENDING";structColor="#00e87a";}
  else if(lowerHighs>=2&&higherLows>=1){structure="COMPRESSING";structColor="#f0a020";}
  else if(higherHighs>=1&&lowerLows>=1){structure="EXPANDING";structColor="#f0a020";}
  else{structure="RANGING";structColor="#5a5a88";}

  return{
    structure,structColor,lowerHighs,higherHighs,higherLows,lowerLows,
    recentHigh,recentLow,drawdownPct,bounceFromLow,
    swingHighCount:swingH.length,swingLowCount:swingL.length,
    swingHighPrices:swingH.slice(-5).map(s=>s.level),
    swingLowPrices:swingL.slice(-5).map(s=>s.level),
  };
}

// ── Accumulation / Distribution ────────────────────────────────────────
// FIX: Math.max(1,...) guard on third to prevent division-by-zero
function computeAccumDist(bars,lookback){
  lookback=lookback||60;
  const len=bars.length;
  const start=Math.max(0,len-lookback);
  let obv=0;
  const obvArr=[];
  for(let i=start;i<len;i++){
    if(i>start){
      if(bars[i].c>bars[i-1].c)obv+=bars[i].v;
      else if(bars[i].c<bars[i-1].c)obv-=bars[i].v;
    }
    obvArr.push(obv);
  }
  const third=Math.max(1,Math.floor(obvArr.length/3));
  const obvEarly=obvArr.slice(0,third).reduce((a,b)=>a+b,0)/third;
  const obvLate=obvArr.slice(-third).reduce((a,b)=>a+b,0)/third;
  const obvTrend=obvLate>obvEarly?"ACCUMULATING":"DISTRIBUTING";

  const cmfPeriod=Math.min(21,len-start);
  let mfvSum=0,volSum=0;
  for(let i=len-cmfPeriod;i<len;i++){
    const hl=bars[i].h-bars[i].l;
    const mfm=hl>0?((bars[i].c-bars[i].l)-(bars[i].h-bars[i].c))/hl:0;
    mfvSum+=mfm*bars[i].v;
    volSum+=bars[i].v;
  }
  const cmf=volSum>0?mfvSum/volSum:0;

  let upVol=0,dnVol=0;
  for(let i=start+1;i<len;i++){
    if(bars[i].c>=bars[i-1].c)upVol+=bars[i].v;
    else dnVol+=bars[i].v;
  }
  const upDnRatio=dnVol>0?upVol/dnVol:upVol>0?999:1;

  let adVerdict,adColor;
  const score=(cmf>0.05?1:cmf<-0.05?-1:0)+(obvTrend==="ACCUMULATING"?1:-1)+(upDnRatio>1.2?1:upDnRatio<0.8?-1:0);
  if(score>=2){adVerdict="STRONG ACCUMULATION";adColor="#00e87a";}
  else if(score>=1){adVerdict="MILD ACCUMULATION";adColor="#88ccaa";}
  else if(score<=-2){adVerdict="STRONG DISTRIBUTION";adColor="#ff2d55";}
  else if(score<=-1){adVerdict="MILD DISTRIBUTION";adColor="#dd6644";}
  else{adVerdict="NEUTRAL FLOW";adColor="#f0a020";}

  return{obvTrend,cmf,upVol,dnVol,upDnRatio,adVerdict,adColor,score};
}

// ── Bounce Quality ─────────────────────────────────────────────────────
function computeBounceQuality(bars,lookback){
  lookback=lookback||20;
  const len=bars.length;
  if(len<lookback+5)return null;
  const recent=bars.slice(-lookback);
  let lowIdx=0;
  for(let i=1;i<recent.length;i++){if(recent[i].l<recent[lowIdx].l)lowIdx=i;}
  if(lowIdx>=recent.length-2)return{hasBounce:false,quality:"NO BOUNCE",qualityColor:"#5a5a88"};
  const selloff=recent.slice(0,lowIdx+1);
  const bounce=recent.slice(lowIdx);
  if(selloff.length<2||bounce.length<2)return{hasBounce:false,quality:"INSUFFICIENT DATA",qualityColor:"#5a5a88"};
  const avgBody=arr=>arr.reduce((s,b)=>s+Math.abs(b.c-b.o),0)/arr.length;
  const sellBody=avgBody(selloff),bounceBody=avgBody(bounce);
  const bodyRatio=sellBody>0?bounceBody/sellBody:0;
  const avgVol=arr=>arr.reduce((s,b)=>s+b.v,0)/arr.length;
  const sellVol=avgVol(selloff),bounceVol=avgVol(bounce);
  const volRatio=sellVol>0?bounceVol/sellVol:0;
  const sellDrop=selloff[0].o-selloff[selloff.length-1].c;
  const bounceGain=bounce[bounce.length-1].c-bounce[0].l;
  const retracement=sellDrop>0?bounceGain/sellDrop:0;
  let qScore=0;
  qScore+=bodyRatio>0.8?2:bodyRatio>0.5?1:0;
  qScore+=volRatio>1.0?3:volRatio>0.7?2:volRatio>0.4?1:0;
  qScore+=retracement>0.618?3:retracement>0.382?2:retracement>0.236?1:0;
  qScore+=bounce.length>=5?2:bounce.length>=3?1:0;
  let quality,qualityColor;
  if(qScore>=8){quality="STRONG";qualityColor="#00e87a";}
  else if(qScore>=5){quality="MODERATE";qualityColor="#88ccaa";}
  else if(qScore>=3){quality="WEAK";qualityColor="#f0a020";}
  else{quality="VERY WEAK";qualityColor="#ff2d55";}
  return{
    hasBounce:true,quality,qualityColor,qScore,
    bodyRatio:+bodyRatio.toFixed(2),volRatio:+volRatio.toFixed(2),
    retracement:+retracement.toFixed(3),
    bounceBars:bounce.length,selloffBars:selloff.length,
  };
}

// ── Key Test ───────────────────────────────────────────────────────────
function computeKeyTest(spot,supports,resistances,smas){
  if(!spot)return null;
  const allLevels=[];
  supports.forEach(s=>{
    const dist=Math.abs(spot-s.level)/spot;
    if(dist<0.05)allLevels.push({level:s.level,dist,side:"SUPPORT",strength:s.weightedStrength||s.strength,types:s.typeLabels||s.types});
  });
  resistances.forEach(r=>{
    const dist=Math.abs(r.level-spot)/spot;
    if(dist<0.05)allLevels.push({level:r.level,dist,side:"RESISTANCE",strength:r.weightedStrength||r.strength,types:r.typeLabels||r.types});
  });
  [50,100,200].forEach(p=>{
    const v=smas[p];
    if(v!=null){
      const dist=Math.abs(spot-v)/spot;
      if(dist<0.04)allLevels.push({level:v,dist,side:spot>v?"SUPPORT":"RESISTANCE",strength:p===200?8:p===100?5:3,types:["SMA "+p]});
    }
  });
  if(!allLevels.length)return null;
  allLevels.sort((a,b)=>(a.dist*0.4-a.strength*0.01)-(b.dist*0.4-b.strength*0.01));
  const key=allLevels[0];
  const distPct=(spot-key.level)/spot;
  const isAbove=spot>=key.level;
  return{level:key.level,side:key.side,types:key.types,strength:key.strength,distPct,isAbove,
    label:isAbove?`Testing ${key.types[0]} from above`:`Pressing into ${key.types[0]} from below`};
}

// ── Scenario Engine ────────────────────────────────────────────────────
function computeScenarios(spot,supports,resistances,trendStruct,accumDist,bounceQ,verdict){
  if(!spot)return null;
  const pivotSupport=supports[0]||null;
  const nextSupport=supports[1]||null;
  const deepSupport=supports[2]||null;
  const nearRes=resistances[0]||null;
  const farRes=resistances[1]||null;
  if(!pivotSupport)return null;

  const holdTargets=[];
  if(nearRes)holdTargets.push({level:nearRes.level,label:"R1: "+nearRes.typeLabels.join("+"),strength:nearRes.weightedStrength});
  if(farRes)holdTargets.push({level:farRes.level,label:"R2: "+farRes.typeLabels.join("+"),strength:farRes.weightedStrength});
  if(trendStruct&&trendStruct.recentHigh)holdTargets.push({level:trendStruct.recentHigh,label:"Recent High",strength:2});

  const breakTargets=[];
  if(nextSupport)breakTargets.push({level:nextSupport.level,label:"S2: "+nextSupport.typeLabels.join("+"),strength:nextSupport.weightedStrength});
  if(deepSupport)breakTargets.push({level:deepSupport.level,label:"S3: "+deepSupport.typeLabels.join("+"),strength:deepSupport.weightedStrength});

  let holdProb=50;
  if(trendStruct){
    if(trendStruct.structure==="ASCENDING")holdProb+=12;
    else if(trendStruct.structure==="DESCENDING")holdProb-=12;
    else if(trendStruct.structure==="COMPRESSING")holdProb+=3;
  }
  if(accumDist){
    if(accumDist.score>=2)holdProb+=10;else if(accumDist.score>=1)holdProb+=5;
    else if(accumDist.score<=-2)holdProb-=10;else if(accumDist.score<=-1)holdProb-=5;
  }
  if(bounceQ&&bounceQ.hasBounce){
    if(bounceQ.qScore>=8)holdProb+=8;else if(bounceQ.qScore>=5)holdProb+=4;
    else if(bounceQ.qScore<=2)holdProb-=6;
  }
  if(verdict){
    if(verdict.total>=8)holdProb+=8;else if(verdict.total>=3)holdProb+=4;
    else if(verdict.total<=-8)holdProb-=8;else if(verdict.total<=-3)holdProb-=4;
  }
  holdProb=Math.max(10,Math.min(90,holdProb));
  return{
    pivotLevel:pivotSupport.level,pivotTypes:pivotSupport.typeLabels||pivotSupport.types,
    hold:{prob:holdProb,targets:holdTargets},
    brk:{prob:100-holdProb,targets:breakTargets},
  };
}

// ── Weighted Pivots + Clustering ───────────────────────────────────────
function findPivotHighsWeighted(bars,l,r){
  const p=[],totalBars=bars.length;
  const avgVol=bars.reduce((s,b)=>s+b.v,0)/totalBars||1;
  for(let i=l;i<totalBars-r;i++){
    let ok=true;
    for(let j=i-l;j<=i+r;j++){if(j!==i&&bars[j].h>=bars[i].h){ok=false;break;}}
    if(ok){
      const recency=0.5+1.5*(i/totalBars);
      const volBoost=Math.min(2,Math.max(0.5,bars[i].v/avgVol));
      p.push({level:bars[i].h,idx:i,type:"pivotH",recency,volBoost,weight:recency*volBoost});
    }
  }
  return p;
}
function findPivotLowsWeighted(bars,l,r){
  const p=[],totalBars=bars.length;
  const avgVol=bars.reduce((s,b)=>s+b.v,0)/totalBars||1;
  for(let i=l;i<totalBars-r;i++){
    let ok=true;
    for(let j=i-l;j<=i+r;j++){if(j!==i&&bars[j].l<=bars[i].l){ok=false;break;}}
    if(ok){
      const recency=0.5+1.5*(i/totalBars);
      const volBoost=Math.min(2,Math.max(0.5,bars[i].v/avgVol));
      p.push({level:bars[i].l,idx:i,type:"pivotL",recency,volBoost,weight:recency*volBoost});
    }
  }
  return p;
}

function clusterLevelsV2(levels,tolPct){
  if(!levels.length)return[];
  const sorted=[...levels].sort((a,b)=>a.level-b.level);
  const clusters=[];let cl=[sorted[0]];
  for(let i=1;i<sorted.length;i++){
    const mid=cl.reduce((s,c)=>s+c.level,0)/cl.length;
    if(Math.abs(sorted[i].level-mid)/mid<=tolPct/100)cl.push(sorted[i]);
    else{clusters.push(cl);cl=[sorted[i]];}
  }
  clusters.push(cl);
  return clusters.map(c=>{
    const level=c.reduce((s,x)=>s+x.level,0)/c.length;
    const rawStrength=c.length;
    const weightedStrength=c.reduce((s,x)=>s+(x.weight||1),0);
    const types=[...new Set(c.map(x=>x.type))];
    const typeLabels=types.map(t=>{
      if(t.startsWith("fib-"))return"fib-"+(parseFloat(t.split("-")[1])*100).toFixed(1)+"%";
      return t;
    });
    return{level,strength:rawStrength,weightedStrength:+weightedStrength.toFixed(1),types,typeLabels};
  }).sort((a,b)=>b.weightedStrength-a.weightedStrength);
}

function fibRetracements(high,low){
  const d=high-low;
  return[0,0.236,0.382,0.5,0.618,0.786,1.0].map(r=>({ratio:r,level:high-d*r,type:"fib-"+r,weight:r===0.618?2.5:r===0.5?2.0:r===0.382?1.8:1.0}));
}

// ── TF Scaling ─────────────────────────────────────────────────────────
function scalePeriod(base,tf){
  if(tf==="4h")return Math.round(base*1.625);
  if(tf==="1h")return Math.round(base*6.5);
  return base;
}
function recentLB(tf){return tf==="1h"?40:tf==="4h"?20:10;}

// ── Verdict Engine ─────────────────────────────────────────────────────
function computeVerdict(ind){
  let tP=0,mP=0,rP=0;
  const{spot,smas,emas,rsi,willR,macd,bb,trendStruct,divergence}=ind;

  const maO=[smas[10],smas[20],smas[50],smas[100],smas[200]].filter(Boolean);
  if(maO.length>=3){let bu=0,be=0;for(let i=0;i<maO.length-1;i++){if(maO[i]>maO[i+1])bu++;else be++;}tP+=(bu-be)*1.5;}
  if(spot>(smas[50]||spot))tP+=1.5;else tP-=1.5;
  if(spot>(smas[200]||spot))tP+=2;else tP-=2;
  if(emas[9]&&emas[21])tP+=emas[9]>emas[21]?1.5:-1.5;
  if(trendStruct){
    if(trendStruct.structure==="DESCENDING")tP-=2;
    else if(trendStruct.structure==="ASCENDING")tP+=2;
  }
  tP=Math.max(-10,Math.min(10,tP));

  if(rsi!=null){if(rsi>60)mP+=2;else if(rsi>50)mP+=1;else if(rsi<40)mP-=2;else if(rsi<50)mP-=1;}
  if(willR!=null){if(willR>-20)mP+=1.5;else if(willR>-50)mP+=.5;else if(willR<-80)mP-=1.5;else mP-=.5;}
  if(macd.hist!=null){mP+=macd.hist>0?2:-2;if(macd.histPrev!=null)mP+=macd.hist>macd.histPrev?1.5:-1.5;}
  if(macd.line!=null)mP+=macd.line>0?1.5:-1.5;
  if(divergence){if(divergence.bullish)mP+=2;if(divergence.bearish)mP-=2;}
  mP=Math.max(-10,Math.min(10,mP));

  if(bb.pctB!=null){if(bb.pctB<.1)rP+=3;else if(bb.pctB<.3)rP+=1.5;else if(bb.pctB>.9)rP-=3;else if(bb.pctB>.7)rP-=1.5;}
  if(rsi!=null){if(rsi<30)rP+=3;else if(rsi<40)rP+=1;else if(rsi>70)rP-=3;else if(rsi>60)rP-=1;}
  if(spot&&smas[200]){const d2=(spot-smas[200])/smas[200];if(d2<-.15)rP+=2;else if(d2>.3)rP-=2;}
  rP=Math.max(-10,Math.min(10,rP));

  const tot=tP+mP+rP;
  let grade,verdict,color;
  if(tot>=20){grade="A+";verdict="STRONG BUY";color="#00e87a";}
  else if(tot>=14){grade="A";verdict="BUY";color="#00e87a";}
  else if(tot>=8){grade="B+";verdict="LEAN BULL";color="#66ddaa";}
  else if(tot>=3){grade="B";verdict="MILD BULL";color="#88ccaa";}
  else if(tot>=-3){grade="C";verdict="NEUTRAL";color="#f0a020";}
  else if(tot>=-8){grade="C-";verdict="MILD BEAR";color="#cc8866";}
  else if(tot>=-14){grade="D";verdict="LEAN BEAR";color="#dd6644";}
  else if(tot>=-20){grade="D-";verdict="SELL";color="#ff2d55";}
  else{grade="F";verdict="STRONG SELL";color="#ff2d55";}

  return{trendPts:+tP.toFixed(1),momPts:+mP.toFixed(1),mrPts:+rP.toFixed(1),total:+tot.toFixed(1),grade,verdict,color};
}

// ── Strike Suggestions (BS put delta) ──────────────────────────────────
function suggestStrikes(spot,clusters,ivVal,dteVal){
  const below=clusters.filter(s=>s.level<spot).sort((a,b)=>b.level-a.level);
  if(!below.length)return null;
  // Require CSP strike to be at least 2% below spot (skip near-spot noise)
  const minDistPct=0.02;
  const csp=below.find(s=>(spot-s.level)/spot>=minDistPct)||below[below.length-1];
  const t=Math.max(dteVal,1)/365,sqrtT=Math.sqrt(t);
  const approxPutDelta=strike=>{
    if(!ivVal||ivVal<=0||strike<=0||sqrtT<0.01)return null;
    const d1=(Math.log(spot/strike)+0.5*ivVal*ivVal*t)/(ivVal*sqrtT);
    return+Math.abs(normCdf(d1)-1).toFixed(3);
  };
  // Round strike levels to avoid float precision artifacts
  const roundLvl=v=>Math.round(v*100)/100;
  // Spread width floor by price tier
  const minWidth=spot<25?0.5:spot<200?1:5;
  let bps=null;
  const cspIdx=below.indexOf(csp);
  for(let i=cspIdx+1;i<below.length;i++){
    if(roundLvl(csp.level)-roundLvl(below[i].level)>=minWidth){bps=below[i];break;}
  }
  return{
    cspStrike:roundLvl(csp.level),cspStrength:csp.strength,cspWeightedStr:csp.weightedStrength,
    cspDelta:approxPutDelta(csp.level),cspDist:(spot-csp.level)/spot,
    cspTypes:csp.typeLabels||csp.types,
    bpsLong:bps?roundLvl(bps.level):null,bpsStrength:bps?.strength||null,
    bpsTypes:bps?.typeLabels||bps?.types||[],
    spreadWidth:bps?roundLvl(csp.level-bps.level):null,
  };
}

// ── Recommended Key Level (weighted confluence) ────────────────────────
function computeRecommendedLevel(spot,clusters,fibs,smas,bb,atr){
  if(!spot)return null;
  const candidates=[];
  clusters.forEach(s=>{
    if(s.level<spot&&s.level>spot*0.85)
      candidates.push({level:s.level,weight:s.weightedStrength||s.strength*2,source:s.typeLabels?s.typeLabels.join("+"):("×"+s.strength)});
  });
  if(fibs)fibs.forEach(f=>{
    if(f.level<spot&&f.level>spot*0.85&&f.ratio>=0.236){
      const fw=f.ratio===0.618?2.5:f.ratio===0.5?2.0:f.ratio===0.382?1.8:1.0;
      candidates.push({level:f.level,weight:fw,source:"fib-"+(f.ratio*100).toFixed(0)+"%"});
    }
  });
  [50,100,200].forEach(p=>{
    const v=smas[p];
    if(v!=null&&v<spot&&v>spot*0.85)
      candidates.push({level:v,weight:p===200?3.0:p===100?2.0:1.5,source:"SMA"+p});
  });
  if(bb&&bb.lower!=null&&bb.lower<spot&&bb.lower>spot*0.85)
    candidates.push({level:bb.lower,weight:1.5,source:"BB lower"});
  if(atr){const aLvl=spot-atr;if(aLvl>spot*0.85)candidates.push({level:aLvl,weight:1.0,source:"1×ATR"});}
  if(!candidates.length)return null;

  const maxDist=spot*0.15;
  candidates.forEach(c=>{const dist=spot-c.level;c.adjustedWeight=c.weight*(1+(1-dist/maxDist)*0.5);});
  let wSum=0,wTotal=0;
  candidates.forEach(c=>{wSum+=c.level*c.adjustedWeight;wTotal+=c.adjustedWeight;});
  // Dynamic rounding by price tier
  const rawRec=wSum/wTotal;
  const rInc=spot<20?0.05:spot<100?0.10:spot<300?0.50:1.00;
  const recommended=Math.round(rawRec/rInc)*rInc;
  const distPct=(spot-recommended)/spot;
  const cats=new Set(candidates.map(c=>{
    if(c.source.startsWith("fib"))return"fib";
    if(c.source.startsWith("SMA"))return"sma";
    if(c.source.startsWith("BB"))return"bb";
    if(c.source.startsWith("1×ATR"))return"atr";
    return"cluster";
  }));
  let confidence;
  if(cats.size>=4&&wTotal>15)confidence="HIGH";
  else if(cats.size>=3&&wTotal>8)confidence="MEDIUM";
  else confidence="LOW";
  const topSources=candidates.sort((a,b)=>b.adjustedWeight-a.adjustedWeight).slice(0,5).map(c=>c.source);
  return{level:recommended,distPct,confidence,sources:topSources,numFactors:candidates.length,totalWeight:+wTotal.toFixed(1)};
}

// ── Full Analysis Pipeline ─────────────────────────────────────────────
function analyze(bars,tf,opts){
  if(!bars||bars.length<60)return null;
  const closes=bars.map(b=>b.c);
  const spot=closes[closes.length-1];
  const prevClose=closes[closes.length-2];
  const dayChg=(spot-prevClose)/prevClose;

  const rsiP=scalePeriod(14,tf),willP=scalePeriod(14,tf),atrP=scalePeriod(14,tf),bbP=scalePeriod(20,tf);
  const lb=recentLB(tf);

  const smaPeriods=[10,20,50,100,200],emaPeriods=[9,21,50];
  const smas={},emas={};
  smaPeriods.forEach(p=>{smas[p]=smaLast(closes,scalePeriod(p,tf));});
  emaPeriods.forEach(p=>{emas[p]=emaLast(closes,scalePeriod(p,tf));});

  const maSignals={};
  smaPeriods.forEach(p=>{if(smas[p]!=null)maSignals["SMA "+p]=spot>smas[p]?1:-1;});
  emaPeriods.forEach(p=>{if(emas[p]!=null)maSignals["EMA "+p]=spot>emas[p]?1:-1;});
  const maBull=Object.values(maSignals).filter(v=>v>0).length;
  const maTotal=Object.values(maSignals).length;

  const rsiArr=computeRSIArray(closes,rsiP);
  const rsi=rsiArr[rsiArr.length-1];
  const rsiRecent=rsiArr.slice(-lb);
  const rsiWasOS=rsiRecent.some(r=>r!=null&&r<30);
  const rsiWasOB=rsiRecent.some(r=>r!=null&&r>70);
  const rsiRecovering=rsiWasOS&&rsi!=null&&rsi>35;
  const rsiTopping=rsiWasOB&&rsi!=null&&rsi<65;
  const divergence=detectRSIDivergence(bars,rsiArr,scalePeriod(30,tf));

  const willArr=computeWillRArray(bars,willP);
  const willR=willArr[willArr.length-1];

  const macd=computeMACD(closes,scalePeriod(12,tf),scalePeriod(26,tf),scalePeriod(9,tf));
  const macdCrossUp=macd.hist!=null&&macd.hist>0&&macd.histPrev!=null&&macd.histPrev<=0;
  const macdCrossDn=macd.hist!=null&&macd.hist<0&&macd.histPrev!=null&&macd.histPrev>=0;

  const bb=computeBollinger(closes,bbP,2);
  const atr=computeATR(bars,atrP);
  const atrPct=atr&&spot?atr/spot:null;

  const vols=bars.slice(-50).map(b=>b.v);
  const avgVol=vols.reduce((a,b)=>a+b,0)/vols.length;
  const lastVol=bars[bars.length-1].v;
  const volRatio=avgVol>0?lastVol/avgVol:null;

  const trendStruct=detectTrendStructure(bars,scalePeriod(60,tf));

  const fibBars=bars.slice(-Math.min(opts.fibLookback,bars.length));
  const fibHigh=Math.max(...fibBars.map(b=>b.h));
  const fibLow=Math.min(...fibBars.map(b=>b.l));
  const fibs=fibRetracements(fibHigh,fibLow);

  const pivH=findPivotHighsWeighted(bars,opts.pivLR,opts.pivLR);
  const pivL=findPivotLowsWeighted(bars,opts.pivLR,opts.pivLR);

  const allLevels=[
    ...fibs,...pivH,...pivL,
    ...smaPeriods.map(p=>smas[p]!=null?{level:smas[p],type:"sma"+p,weight:p===200?2.5:p===100?2:1.5}:null).filter(Boolean),
  ];
  const clusters=clusterLevelsV2(allLevels,opts.clusterTol);

  const supports=clusters.filter(c=>c.level<spot).sort((a,b)=>b.level-a.level).slice(0,8);
  const resistances=clusters.filter(c=>c.level>=spot).sort((a,b)=>a.level-b.level).slice(0,8);
  const supNearest=supports[0]||null;
  const resNearest=resistances[0]||null;

  const verdict=computeVerdict({spot,smas,emas,rsi,willR,macd,bb,trendStruct,divergence});
  const strikes=suggestStrikes(spot,clusters,opts.iv,opts.dte);
  const recLevel=computeRecommendedLevel(spot,clusters,fibs,smas,bb,atr);

  const accumDist=computeAccumDist(bars,scalePeriod(60,tf));
  const bounceQ=computeBounceQuality(bars,scalePeriod(20,tf));
  const keyTest=computeKeyTest(spot,supports,resistances,smas);
  const scenarios=computeScenarios(spot,supports,resistances,trendStruct,accumDist,bounceQ,verdict);

  // ROC for G5 Momentum Gate
  const roc14=computeROC(closes,scalePeriod(14,tf));
  const roc5=computeROC(closes,scalePeriod(5,tf));
  const g5Pass=rsi!=null&&rsi>40&&rsi<70&&roc14!=null&&roc14>-0.02;

  // Expected Move (MM 1-sigma)
  const expectedMove=computeExpectedMove(spot,opts.iv,opts.dte);

  return{
    spot,prevClose,dayChg,barCount:bars.length,tf:tf.toUpperCase(),
    smas,emas,maSignals,maBull,maTotal,
    rsi:nz(rsi),rsiP,rsiRecovering,rsiTopping,divergence,
    willR:nz(willR),willP,
    macd:{line:nz(macd.line),signal:nz(macd.signal),hist:nz(macd.hist),histPrev:nz(macd.histPrev)},
    macdCrossUp,macdCrossDn,
    bb,bbP,atr:nz(atr),atrPct:nz(atrPct),atrP,
    lastVol,avgVol,volRatio:nz(volRatio),
    trendStruct,
    fibs,fibHigh,fibLow,
    clusters,supports,resistances,supNearest,resNearest,
    verdict,strikes,recLevel,
    accumDist,bounceQ,keyTest,scenarios,
    roc14:nz(roc14),roc5:nz(roc5),g5Pass,expectedMove,
    iv:opts.iv,dte:opts.dte,
  };
}

// BRIEF GENERATOR — Narrative synthesis of all computed signals
// ════════════════════════════════════════════════════════════════════════
function generateBrief(A){
  if(!A)return"";
  const v=A.verdict, ts=A.trendStruct, ad=A.accumDist, bq=A.bounceQ, sc=A.scenarios, kt=A.keyTest, st=A.strikes, rl=A.recLevel, em=A.expectedMove;
  const sym=esc(S.sym.toUpperCase().replace(/[^A-Z0-9.\-^=]/g,""));
  const now=new Date();
  const etStr=now.toLocaleString("en-US",{timeZone:"America/New_York",month:"short",day:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit",hour12:false})+" ET";
  const chgSign=A.dayChg>=0?"+":"";
  const chgDir=A.dayChg>=0?"▲":"▼";

  let b=`<span class="hi">${sym}</span> closed at <span class="hl">${fm(A.spot)}</span> (${chgDir} ${chgSign}${pct1(A.dayChg)}), `;
  b+=`grading <span style="color:${v.color};font-weight:800">${v.grade} / ${v.verdict}</span> with a composite of <span class="hl">${v.total>0?"+":""}${v.total}</span> `;
  b+=`(Trend ${v.trendPts>0?"+":""}${v.trendPts}, Momentum ${v.momPts>0?"+":""}${v.momPts}, Reversion ${v.mrPts>0?"+":""}${v.mrPts}). `;

  // Trend Structure
  if(ts){
    const sColor=ts.structure==="ASCENDING"?"hg":ts.structure==="DESCENDING"?"hr":"hy";
    b+=`Trend structure is <span class="${sColor}">${ts.structure}</span> `;
    b+=`(HH:${ts.higherHighs} LH:${ts.lowerHighs} HL:${ts.higherLows} LL:${ts.lowerLows}) `;
    b+=`with price ${pct1(Math.abs(ts.drawdownPct))} from the ${fm(ts.recentHigh)} peak`;
    if(ts.bounceFromLow>0.01)b+=` and ${pct1(ts.bounceFromLow)} above the ${fm(ts.recentLow)} low`;
    b+=`. `;
  }

  // MA Alignment + EMA Cross
  b+=`MA alignment: <span class="hl">${A.maBull}/${A.maTotal}</span> bullish`;
  if(A.emas[9]!=null&&A.emas[21]!=null){
    b+=A.emas[9]>A.emas[21]?`, 9/21 EMA <span class="hg">bull cross</span>`:`, 9/21 EMA <span class="hr">bear cross</span>`;
  }
  b+=`. `;

  // Momentum — RSI + MACD + Divergence
  if(A.rsi!=null){
    const rZone=A.rsi>70?"overbought":A.rsi>60?"elevated":A.rsi<30?"oversold":A.rsi<40?"depressed":"mid-range";
    b+=`RSI(${A.rsiP}) at <span class="hl">${f1(A.rsi)}</span> is ${rZone}`;
    if(A.rsiRecovering)b+=` and recovering from oversold`;
    if(A.rsiTopping)b+=` and rolling over from overbought`;
  }
  if(A.divergence){
    if(A.divergence.bullish)b+=` with <span class="hg">bullish divergence</span> detected`;
    else if(A.divergence.bearish)b+=` with <span class="hr">bearish divergence</span> detected`;
    else b+=` with no divergence`;
  }
  b+=`. `;

  if(A.macd.hist!=null){
    const expanding=A.macd.histPrev!=null&&Math.abs(A.macd.hist)>Math.abs(A.macd.histPrev);
    const histDir=A.macd.hist>0?"green":"red";
    b+=`MACD histogram is <span class="${A.macd.hist>0?"hg":"hr"}">${expanding?"expanding":"contracting"} ${histDir}</span>`;
    if(A.macdCrossUp)b+=` — <span class="hg">fresh bull cross</span>`;
    if(A.macdCrossDn)b+=` — <span class="hr">fresh bear cross</span>`;
    b+=`. `;
  }

  // G5 Momentum Gate
  if(A.roc14!=null){
    b+=`ROC(14) at <span class="hl">${pct1(A.roc14)}</span>`;
    b+=`, G5 Momentum Gate: <span class="${A.g5Pass?"hg":"hr"}">${A.g5Pass?"PASS":"FAIL"}</span>. `;
  }

  // Accum/Dist
  if(ad){
    b+=`Flow reads <span style="color:${ad.adColor};font-weight:700">${ad.adVerdict}</span> `;
    b+=`(CMF ${(ad.cmf*100).toFixed(1)}%, OBV ${ad.obvTrend.toLowerCase()}, Up/Dn vol ${f2(ad.upDnRatio)}x). `;
  }

  // Bounce Quality
  if(bq&&bq.hasBounce){
    b+=`Bounce quality scores <span style="color:${bq.qualityColor};font-weight:700">${bq.quality}</span> (${bq.qScore}/10) `;
    b+=`with a ${(bq.retracement*100).toFixed(1)}% retracement over ${bq.bounceBars} bars. `;
  }

  // Volume
  if(A.volRatio!=null){
    const volDesc=A.volRatio>1.5?"high":A.volRatio>1?"above-average":A.volRatio>0.5?"below-average":"low";
    b+=`Volume at <span class="hl">${f2(A.volRatio)}x</span> average (${volDesc}). `;
  }

  // Key Test
  if(kt){
    const ktClass=kt.side==="SUPPORT"?"hg":"hr";
    b+=`The key test is <span class="${ktClass}">${kt.types.join("+")} at ${fm(kt.level)}</span> `;
    b+=`as ${kt.side.toLowerCase()} ${kt.isAbove?"from above":"from below"} (${pct1(Math.abs(kt.distPct))} away). `;
  }

  // Scenarios
  if(sc){
    b+=`Scenario engine gives <span class="hg">${sc.hold.prob}% hold</span> / <span class="hr">${sc.brk.prob}% break</span> `;
    b+=`at the ${fm(sc.pivotLevel)} pivot (${sc.pivotTypes.join("+")}). `;
    if(sc.hold.targets.length){
      b+=`If held → `;
      sc.hold.targets.slice(0,2).forEach((t,i)=>{
        if(i)b+=`, `;
        b+=`<span class="hg">${fm(t.level)}</span> (${esc(t.label)})`;
      });
      b+=`. `;
    }
    if(sc.brk.targets.length){
      b+=`If broken → `;
      sc.brk.targets.slice(0,2).forEach((t,i)=>{
        if(i)b+=`, `;
        b+=`<span class="hr">${fm(t.level)}</span> (${esc(t.label)})`;
      });
      b+=`. `;
    }
  }

  // Bollinger context
  if(A.bb.pctB!=null){
    const bbDesc=A.bb.pctB>0.9?"pressing upper band":A.bb.pctB>0.7?"in upper band zone":A.bb.pctB<0.1?"pressing lower band":A.bb.pctB<0.3?"in lower band zone":"mid-band";
    b+=`Bollinger %B at ${(A.bb.pctB*100).toFixed(1)}% — ${bbDesc}`;
    if(A.bb.bw!=null)b+=` (BW: ${pct1(A.bb.bw)})`;
    b+=`. `;
  }

  // Recommended Level
  if(rl){
    const rlClass=rl.confidence==="HIGH"?"hg":rl.confidence==="MEDIUM"?"hy":"hi";
    b+=`Recommended key level: <span class="${rlClass}">${fm(rl.level)}</span> `;
    b+=`(<span class="${rlClass}">${rl.confidence}</span> confidence, ${rl.numFactors} factors, ${rl.totalWeight} wt). `;
  }

  // Strike Engineering
  if(st){
    b+=`CSP reference strike at <span class="hm">${fm(st.cspStrike)}</span> `;
    b+=`(|Δ| ${st.cspDelta!=null?st.cspDelta:"—"}, ${pct1(st.cspDist)} OTM, ${st.cspTypes.join("+")})`;
    if(st.bpsLong){
      b+=`; BPS long leg at <span class="hb">${fm(st.bpsLong)}</span> `;
      b+=`(spread: ${fm(st.spreadWidth)})`;
    }
    b+=`. `;
  }

  // Expected Move — always render this block separately for visual emphasis
  let emBlock="";
  if(em){
    const cspInside=st&&st.cspStrike>(A.spot-em.em);
    const cspOutside=st&&st.cspStrike<=(A.spot-em.em);
    emBlock+=`<span class="hb">MM Expected Move (1σ):</span> ±${fm(em.em)} (${pct1(em.pct)}) over ${A.dte} DTE → Range: <span class="hr">${fm(em.lower)}</span> to <span class="hg">${fm(em.upper)}</span> at IV=${A.iv}. `;
    if(st){
      if(cspOutside)emBlock+=`CSP strike at ${fm(st.cspStrike)} sits <span class="hg">outside</span> the expected move — favorable positioning. `;
      else if(cspInside)emBlock+=`CSP strike at ${fm(st.cspStrike)} sits <span class="hr">inside</span> the expected move — elevated risk. `;
    }
    if(rl){
      const rlInside=rl.level>(A.spot-em.em);
      if(rlInside)emBlock+=`Recommended level at ${fm(rl.level)} is within the EM range. `;
      else emBlock+=`Recommended level at ${fm(rl.level)} is below the EM floor — added cushion. `;
    }
  }

  // Closing line
  b+=`<em>Reference only — not a forecast or trade recommendation.</em>`;

  return{narrative:b,emBlock,timestamp:etStr};
}

    expectedMove:A.expectedMove,

    strikes:A.strikes,

    keyTest:A.keyTest?{level:A.keyTest.level,side:A.keyTest.side,
      types:A.keyTest.types,strength:A.keyTest.strength,distPct:A.keyTest.distPct,
      isAbove:A.keyTest.isAbove,label:A.keyTest.label}:null,

    scenarios:A.scenarios?{pivotLevel:A.scenarios.pivotLevel,pivotTypes:A.scenarios.pivotTypes,
      holdScore:A.scenarios.hold.prob,breakScore:A.scenarios.brk.prob,
      scoresAreHeuristic:true,
      holdTargets:A.scenarios.hold.targets.slice(0,3),
      breakTargets:A.scenarios.brk.targets.slice(0,3)}:null,

    supports:A.supports.slice(0,6).map(s=>({level:s.level,strength:s.strength,
      weightedStrength:s.weightedStrength,types:s.typeLabels||s.types})),
    resistances:A.resistances.slice(0,6).map(r=>({level:r.level,strength:r.strength,
      weightedStrength:r.weightedStrength,types:r.typeLabels||r.types})),

    smas:A.smas,
    bb:{upper:A.bb.upper,mid:A.bb.mid,lower:A.bb.lower,pctB:A.bb.pctB,bw:A.bb.bw},
    atr:A.atr,atrPct:A.atrPct,
    volRatio:A.volRatio,

    briefText:brief.narrative.replace(/<[^>]+>/g,""),
    briefHtml:brief.narrative+(brief.emBlock?"<br/>"+brief.emBlock:""),
    briefTimestamp:brief.timestamp,
  };
}

async function exportToDesk(){
  // Use cached analysis if available, otherwise recompute
  const A=S._analysis||(S.bars?analyze(S.bars,S.tf,{
    fibLookback:S.fibLookback,pivLR:S.pivLR,clusterTol:S.clusterTol,iv:S.iv,dte:S.dte,
  }):null);
  if(!A){S.exportMsg="✗ No analysis to export";render();return;}
  const pkt=generatePacket(A);
  if(!pkt){S.exportMsg="✗ Packet generation failed";render();return;}
  const json=JSON.stringify(pkt,null,2);
  try{
    await navigator.clipboard.writeText(json);
    S.exportMsg="✓ Analyst packet copied — SWITCH TO TRADE DESK → NEW TRADE";
    try{localStorage.setItem("nuvo_analyst_packet_pending_v3_6",json);}catch(e){}
  }catch(e){
    // Fallback: select from textarea
    const ta=document.createElement("textarea");
    ta.value=json;ta.style.position="fixed";ta.style.opacity="0";
    document.body.appendChild(ta);ta.select();
    try{document.execCommand("copy");S.exportMsg="✓ Packet copied (fallback) — SWITCH TO TRADE DESK → NEW TRADE";
    try{localStorage.setItem("nuvo_analyst_packet_pending_v3_6",json);}catch(e){}}
    catch(e2){S.exportMsg="✗ Copy failed — check browser permissions";}
    document.body.removeChild(ta);
  }
  render();
  setTimeout(()=>{S.exportMsg=null;render();},8000);
}


// ════════════════════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════════════════════
function render(){
  // Cache analysis: recompute only when inputs change
  const cacheKey=S.bars?(S.bars[S.bars.length-1].t+"|"+S.tf+"|"+S.fibLookback+"|"+S.pivLR+"|"+S.clusterTol+"|"+S.iv+"|"+S.dte):"";
  let A=null;
  if(S.bars){
    if(cacheKey===S._cacheKey&&S._analysis){A=S._analysis;}
    else{
      A=analyze(S.bars,S.tf,{fibLookback:S.fibLookback,pivLR:S.pivLR,clusterTol:S.clusterTol,iv:S.iv,dte:S.dte});
      S._cacheKey=cacheKey;S._analysis=A;
    }
  }

  const app=document.getElementById("ta-app");
  let h=`<div class="header">
    <div class="header-top">
      <span class="logo">NUVO</span>
      <span class="version">STRICT TA v10.2</span>
      <span class="live-info">${S.lastUpdate?"Updated "+S.lastUpdate.toLocaleTimeString():""}${S.autoRefresh&&isMarketOpen()?'<span class="live-dot">● LIVE</span>':""}</span>
    </div>
    <div class="controls">
      <input type="text" class="ticker-input" id="symInput" value="${esc(S.sym)}" placeholder="TICKER">
      <button class="tf-btn ${S.tf==="1h"?"active":""}" onclick="setTF('1h')">1H</button>
      <button class="tf-btn ${S.tf==="4h"?"active":""}" onclick="setTF('4h')">4H</button>
      <button class="tf-btn ${S.tf==="daily"?"active":""}" onclick="setTF('daily')">DAILY</button>
      <button class="btn-analyze" id="analyzeBtn" ${S.loading?"disabled":""}>${S.loading?"⟳ LOADING":"ANALYZE"}</button>
      <button class="btn-sm ${S.autoRefresh?"on":""}" onclick="toggleAuto()">${S.autoRefresh?"AUTO ●":"AUTO ○"}</button>
      <button class="btn-sm" onclick="toggleSettings()">⚙ TUNE</button>
    </div>`;

  if(S.showSettings){
    h+=`<div class="settings-panel">
      <label>DTE<input type="number" value="${S.dte}" min="1" max="60" onchange="S.dte=+this.value;render()"></label>
      <label>IV<input type="number" value="${S.iv}" min="0.05" max="2" step="0.05" onchange="S.iv=+this.value;render()"></label>
      <label>Fib Lookback<input type="number" value="${S.fibLookback}" min="20" max="1000" onchange="S.fibLookback=+this.value;render()"></label>
      <label>Pivot L/R<input type="number" value="${S.pivLR}" min="2" max="15" onchange="S.pivLR=+this.value;render()"></label>
      <label>Cluster Tol %<input type="number" value="${S.clusterTol}" min="0.1" max="3" step="0.1" onchange="S.clusterTol=+this.value;render()"></label>
    </div>`;
  }
  if(S.error)h+=`<div class="error">✗ ${esc(S.error)}</div>`;
  h+=`</div>`;

  if(A){
    const v=A.verdict;
    const chgArrow=A.dayChg>=0?"▲":"▼";
    const chgColor=A.dayChg>=0?"var(--g)":"var(--r)";
    const ts=A.trendStruct;

    // ── TICKER HEADER ──────────────────────────────────────────────────
    h+=`<div class="ticker-head">
      <span class="ticker-sym">${esc(S.sym.toUpperCase())}</span>
      <span class="ticker-price">${fm(A.spot)}</span>
      <span class="ticker-chg" style="color:${chgColor}">${chgArrow} ${pct1(Math.abs(A.dayChg))}</span>
      <span class="badge" style="background:rgba(48,152,224,.13);color:var(--b);border:1px solid rgba(48,152,224,.33)">${A.tf}</span>
      <span style="color:var(--dd);font-size:11px">${A.barCount} bars</span>
    </div>`;

    // ── TREND STRUCTURE BAR ────────────────────────────────────────────
    if(ts){
      h+=`<div style="padding:10px 14px;margin-bottom:12px;background:var(--sf);border-radius:4px;border:1px solid var(--border)">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <span class="struct-tag" style="background:${ts.structColor}22;color:${ts.structColor};border:1px solid ${ts.structColor}55">${ts.structure}</span>
          <span style="font-size:11px;color:var(--d)">LH:${ts.lowerHighs} HH:${ts.higherHighs} HL:${ts.higherLows} LL:${ts.lowerLows}</span>
          <span style="font-size:11px;color:var(--r)">Peak ${fm(ts.recentHigh)} (${pct1(ts.drawdownPct)})</span>
          <span style="font-size:11px;color:var(--g)">Low ${fm(ts.recentLow)} (+${pct1(ts.bounceFromLow)})</span>`;
      if(A.divergence&&A.divergence.bullish)h+=`<span class="struct-tag" style="background:rgba(0,232,122,.15);color:var(--g);border:1px solid rgba(0,232,122,.4)">RSI BULL DIV ↑</span>`;
      if(A.divergence&&A.divergence.bearish)h+=`<span class="struct-tag" style="background:rgba(255,45,85,.15);color:var(--r);border:1px solid rgba(255,45,85,.4)">RSI BEAR DIV ↓</span>`;
      h+=`</div>`;

      if(ts.swingHighPrices&&ts.swingHighPrices.length>=2){
        h+=`<div style="margin-top:6px;font-size:10px"><span style="color:var(--d)">Swing Highs: </span>`;
        ts.swingHighPrices.forEach((p,i)=>{
          const isLH=i>0&&p<ts.swingHighPrices[i-1];
          const isHH=i>0&&p>=ts.swingHighPrices[i-1];
          const c=isLH?"var(--r)":isHH?"var(--g)":"var(--t)";
          h+=`<span style="color:${c};font-weight:700">${fm(p)}</span>`;
          if(i<ts.swingHighPrices.length-1)h+=`<span style="color:var(--dd)"> → </span>`;
        });
        h+=`</div>`;
      }
      if(ts.swingLowPrices&&ts.swingLowPrices.length>=2){
        h+=`<div style="margin-top:3px;font-size:10px"><span style="color:var(--d)">Swing Lows: </span>`;
        ts.swingLowPrices.forEach((p,i)=>{
          const isHL=i>0&&p>ts.swingLowPrices[i-1];
          const isLL=i>0&&p<=ts.swingLowPrices[i-1];
          const c=isHL?"var(--g)":isLL?"var(--r)":"var(--t)";
          h+=`<span style="color:${c};font-weight:700">${fm(p)}</span>`;
          if(i<ts.swingLowPrices.length-1)h+=`<span style="color:var(--dd)"> → </span>`;
        });
        h+=`</div>`;
      }
      h+=`</div>`;
    }

    // ── VERDICT ────────────────────────────────────────────────────────
    h+=`<div class="card" style="border-color:${v.color}44">
      <div class="verdict-box">
        <div class="verdict-grade" style="color:${v.color};text-shadow:0 0 24px ${v.color}44">${v.grade}</div>
        <div>
          <div class="verdict-label" style="color:${v.color}">${v.verdict}</div>
          <div class="verdict-detail">Trend ${v.trendPts>0?"+":""}${v.trendPts} · Momentum ${v.momPts>0?"+":""}${v.momPts} · Reversion ${v.mrPts>0?"+":""}${v.mrPts}</div>
        </div>
        <div class="verdict-right">
          <div style="font-size:11px;color:var(--d)">Composite</div>
          <div style="font-size:22px;font-weight:700;color:${v.color}">${v.total>0?"+":""}${v.total}</div>
        </div>
      </div>
      <div class="grid3" style="margin-top:12px">
        ${[["TREND",v.trendPts],["MOMENTUM",v.momPts],["MEAN REV",v.mrPts]].map(([label,pts])=>{
          const c2=pts>=0?"var(--g)":"var(--r)";
          return`<div><div style="font-size:9px;color:var(--d);letter-spacing:1px;margin-bottom:4px">${label}</div>
            <div class="score-bar-track"><div class="score-bar-fill" style="width:${Math.abs(pts)*10}%;background:${c2};margin-left:${pts<0?"auto":"0"};box-shadow:0 0 8px ${c2}66"></div></div></div>`;
        }).join("")}

    </div>`;

    // ── RECOMMENDED KEY LEVEL ──────────────────────────────────────────
    if(A.recLevel){
      const rl=A.recLevel;
      const confColor=rl.confidence==="HIGH"?"var(--g)":rl.confidence==="MEDIUM"?"var(--y)":"var(--d)";
      const confBg=rl.confidence==="HIGH"?"rgba(0,232,122,.06)":rl.confidence==="MEDIUM"?"rgba(240,160,32,.06)":"rgba(90,90,136,.06)";
      h+=`<div class="card" style="border-color:${confColor};border-width:2px;background:${confBg}">
        <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
          <div>
            <div style="font-size:10px;color:var(--d);letter-spacing:1.5px;font-weight:700;margin-bottom:4px">RECOMMENDED KEY LEVEL</div>
            <div style="font-size:36px;font-weight:900;color:${confColor};line-height:1;text-shadow:0 0 20px ${confColor}33">${fm(rl.level)}</div>
          </div>
          <div style="flex:1;min-width:180px">
            <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:6px">
              <span class="badge" style="background:${confColor}22;color:${confColor};border:1px solid ${confColor}55">${rl.confidence} CONFIDENCE</span>
              <span style="font-size:12px;color:var(--d)">${pct1(rl.distPct)} below spot</span>

            </div>
            <div style="font-size:10px;color:var(--dd);margin-top:4px">Sources: ${rl.sources.map(s=>'<span style="color:var(--ice);background:var(--sf);padding:1px 5px;border-radius:2px;margin-right:4px;font-size:9px">'+esc(s)+'</span>').join("")}</div>
          </div>
        </div>
      </div>`;
    }

    // ── KEY TEST ───────────────────────────────────────────────────────
    if(A.keyTest){
      const kt=A.keyTest;
      const ktColor=kt.side==="SUPPORT"?"var(--g)":"var(--r)";
      const ktBg=kt.side==="SUPPORT"?"rgba(0,232,122,.04)":"rgba(255,45,85,.04)";
      h+=`<div class="card" style="border-color:${ktColor};background:${ktBg}">
        <div class="card-title">⚡ Key Test</div>
        <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
          <div style="font-size:28px;font-weight:900;color:${ktColor}">${fm(kt.level)}</div>
          <div>
            <div style="font-size:13px;font-weight:700;color:${ktColor}">${kt.label}</div>
            <div style="font-size:11px;color:var(--d);margin-top:2px">${kt.types.join(", ")} · Strength: ${f1(kt.strength)} · ${kt.isAbove?"Price above":"Price below"} by ${pct1(Math.abs(kt.distPct))}</div>

    }

    // ── TRIPLE SIGNAL CONFLUENCE ───────────────────────────────────────
    h+=`<div class="card"><div class="card-title">Triple Signal Confluence</div><div class="grid3">`;

      ["SUPPORT",A.supNearest&&(A.spot-A.supNearest.level)/A.spot<.03,false,A.supNearest?`${fm(A.supNearest.level)} (${((A.spot-A.supNearest.level)/A.spot*100).toFixed(1)}% below)`:"None"],
    ];
    tripleData.forEach(([label,bull,bear,detail])=>{

    // ── SCENARIO ENGINE ────────────────────────────────────────────────
    if(A.scenarios){

            <div style="font-size:9px;color:var(--d);letter-spacing:1px;margin-top:4px">DN VOL</div>

          </div>
        </div>
      </div>`;
    }

    // ── BOUNCE QUALITY ─────────────────────────────────────────────────
    if(A.bounceQ){
      const bq=A.bounceQ;
      if(bq.hasBounce){
        h+=`<div class="card" style="border-color:${bq.qualityColor}44">
          <div class="card-title">Bounce Quality Analysis</div>
          <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:10px">
            <div style="font-size:18px;font-weight:800;color:${bq.qualityColor}">${bq.quality}</div>

            </div>
            <div>
              <div style="font-size:9px;color:var(--d);letter-spacing:1px;margin-bottom:4px">VOLUME RATIO</div>

async function doFetch(){
  const s=S.sym.trim().toUpperCase().replace(/[^A-Z0-9.\-^=]/g,"");
  S.sym=s;
  if(!s)return;
  S.loading=true;S.error=null;render();
  try{
    S.bars=await fetchBars(s,S.tf);
    S.lastUpdate=new Date();
  }catch(e){S.bars=null;S.error=e.message;}
  S.loading=false;render();
}

function toggleAuto(){S.autoRefresh=!S.autoRefresh;setupAutoRefresh();render();}
function toggleSettings(){S.showSettings=!S.showSettings;render();}
function setupAutoRefresh(){
  if(refreshTimer){clearInterval(refreshTimer);refreshTimer=null;}
  if(S.autoRefresh)refreshTimer=setInterval(()=>{if(isMarketOpen())doFetch();},30000);
}

// ── Init ───────────────────────────────────────────────────────────────
render();
doFetch();
setupAutoRefresh();

window.doFetch = doFetch;

window.setTF = setTF;
window.toggleAuto = toggleAuto;
window.toggleSettings = toggleSettings;
window.exportToDesk = exportToDesk;
window.setupAutoRefresh = setupAutoRefresh;

function fmtDate(ts) { if (!ts) return "-"; try { return new Date(ts).toLocaleDateString("en-US", { month: "short", day: "2-digit" }); } catch { return "-"; } }
function ymdToDate(ymd) { const [y,m,d] = (ymd||"").split("-").map(Number); return new Date(y, (m||1)-1, d||1); }
function addDays(ymd, delta) { const dt = ymdToDate(ymd); dt.setDate(dt.getDate()+delta); return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0"); }

const Ncdf = (x) => {
  const s = x < 0 ? -1 : 1;
  const t = 1 / (1 + 0.2316419 * Math.abs(x));
  const d = Math.exp(-0.5 * x * x) / Math.sqrt(2 * Math.PI);
  const p = d * t * (0.31938153 + t * (-0.35656378 + t * (1.78147794 + t * (-1.82125598 + t * 1.33027443))));
  return s === 1 ? 1 - p : p;
};

const regime = (v) => (v < 17 ? "CALM" : v <= 23 ? "NORMAL" : v <= 30 ? "ELEVATED" : "PANIC");
const RC = {
  CALM:     { sig: 0.50, vrp: 0.010, col: K.g, bg: "rgba(34,197,94,0.08)" },
  NORMAL:   { sig: 0.75, vrp: 0.015, col: K.a, bg: "rgba(59,130,246,0.08)" },
  ELEVATED: { sig: 1.00, vrp: 0.020, col: K.y, bg: "rgba(245,158,11,0.08)" },
  PANIC:    { sig: 1.25, vrp: 0.030, col: K.r, bg: "rgba(239,68,68,0.08)" },
};

function strikeIncrementFromSpot(S) { if (!ok(S)||S<=0) return 1; if (S<25) return 0.5; if (S<200) return 1; return 5; }
function roundToInc(x, inc) { if (!ok(x)||!ok(inc)||inc<=0) return NaN; return Math.floor(x/inc)*inc; }

function expectedMove(spot, iv, dte) { return spot * iv * Math.sqrt(dte / 365); }
function bsD2(spot, strike, iv, dte) {
  if ([spot,strike,iv,dte].some(v=>!ok(v)||v<=0)) return NaN;
  const T=dte/365, sqrtT=Math.sqrt(T);
  return (Math.log(spot/strike)+0.5*iv*iv*T)/(iv*sqrtT)-iv*sqrtT;
}
function calcPopPut(spot, strike, iv, dte) { const d2=bsD2(spot,strike,iv,dte); return ok(d2)?clamp(Ncdf(d2),0,1):NaN; }
function probTouch(spot, strike, iv, dte) {
  if ([spot,strike,iv,dte].some(v=>!ok(v)||v<=0)) return NaN;
  const z=-Math.log(spot/strike)/(iv*Math.sqrt(dte/365));
  return clamp(2*Ncdf(z),0,1);
}

function rorMinDTE(ror30, dte) { if (!ok(ror30)||ror30<=0||!ok(dte)||dte<=0) return NaN; return ror30*(dte/30); }
function pcsMinCredit(width, r) { if (!ok(width)||width<=0||!ok(r)||r<=0) return NaN; return (r/(1+r))*width; }

function recPcsWidth(aum, r, contracts, bpsRiskPct) {
  const n=Math.max(1,Math.floor(Number(contracts)||1));
  if (!ok(aum)||aum<=0) return { err: "Set AUM in CONFIG" };
  if (!ok(r)||r<=0) return { err: "Invalid RoR floor" };
  const pct=ok(bpsRiskPct)&&bpsRiskPct>0?bpsRiskPct:0.02;
  const riskCap=aum*pct;
  for (const w of [1,2,2.5,5,10]) {
    const cmin=pcsMinCredit(w,r); const maxLossPS=w-cmin; const risk=maxLossPS*100*n;
    if (risk<=riskCap&&cmin<w) return { w, cmin, maxLossPS, risk, riskCap };
  }
  return { err: "No width fits risk cap", riskCap };
}

async function apiGet(path) {
  const url=WORKER_BASE+path+(path.includes("?")?"&":"?")+"ts="+Date.now();
  const res=await fetch(url,{method:"GET",mode:"cors",cache:"no-store"});
  if (!res.ok) throw new Error("HTTP "+res.status);
  const data=await res.json();
  if (data&&data.error) throw new Error(data.error);
  return data;
}
async function fetchSnapshot(ticker) {
  const t=(ticker||"").trim().toUpperCase();
  if (!t) throw new Error("Missing ticker");
  return apiGet("/all?ticker="+encodeURIComponent(t));
}

  throw new Error("Options endpoint disabled — no /option route + Polygon entitlement");
}

function evaluateTrade(input, cfg, openPositions) {
  const STR=input.structure;
  const S=parseFloat(input.spot), IV=parseFloat(input.iv), DTE=parseInt(input.dte,10);
  const Kshort=parseFloat(input.strike), CR=parseFloat(input.credit);
  const W=STR==="PCS"?parseFloat(input.width):null;
  const N=parseInt(input.contracts,10)||0;
  const VIX=parseFloat(input.vix), VIXY=parseFloat(input.vixY);
  const RV10=parseFloat(input.rv10), RV20=parseFloat(input.rv20);

  if (!["CSP","PCS"].includes(STR)) return { error: "Invalid structure" };
  if ([S,IV,VIX,VIXY,RV10,RV20].some(v=>!ok(v))) return { error: "Missing required fields" };
  if (!ok(DTE)||DTE<=0) return { error: "DTE must be > 0" };
  if (!ok(Kshort)||Kshort<=0) return { error: "Strike required" };
  if (!ok(CR)||CR<0) return { error: "Credit required" };
  if (!ok(N)||N<1) return { error: "Contracts required" };
  if (STR==="PCS") { if (!ok(W)||W<=0) return { error: "Width required for PCS" }; if (W<=CR) return { error: "Width must exceed credit" }; }

  const rg=regime(VIX), c=RC[rg], em=expectedMove(S,IV,DTE), reqSigma=c.sig;
  const sigmaDistance=em>0?(S-Kshort)/em:0;
  const sigmaPass=sigmaDistance>=reqSigma;
  const rising=VIX>VIXY;
  const rv=rising?RV10:RV20;
  const vrp=IV-rv, vrpPass=vrp>=c.vrp;

  const cspRor30=parseFloat(cfg?.ror30)||0.04;
  const pcsRor30=parseFloat(cfg?.pcsRor30)||0.20;
  const cspMin=rorMinDTE(cspRor30,DTE); // credit/strike
  const pcsMin=rorMinDTE(pcsRor30,DTE); // credit/maxLoss
  const rMin=STR==="CSP"?cspMin:pcsMin;

  let ror=0, maxLossPS=0, minPremium=NaN;
  if (STR==="CSP") { ror=Kshort>0?(CR/Kshort):0; maxLossPS=Kshort-CR; minPremium=ok(cspMin)?Kshort*cspMin:NaN; }
  else { maxLossPS=W-CR; ror=maxLossPS>0?(CR/maxLossPS):0; minPremium=ok(pcsMin)?pcsMinCredit(W,pcsMin):NaN; }
  const rorPass=ok(rMin)?(ror>=rMin):false;

  const pop=calcPopPut(S,Kshort,IV,DTE);
  const pt=probTouch(S,Kshort,IV,DTE);
  const breakEven=Kshort-CR;
  const cushionPct=S>0?(S-breakEven)/S:0;

  const s1=S-em, s2=S-2*em;
  let pnl1,pnl2;
  if (STR==="PCS") {
    const Klong=Kshort-W;
    const sv=(s)=>Math.max(0,Kshort-s)-Math.max(0,Klong-s);
    pnl1=CR-sv(s1); pnl2=CR-sv(s2);
  } else { pnl1=CR-Math.max(0,Kshort-s1); pnl2=CR-Math.max(0,Kshort-s2); }

  const tailAdj=ok(pt)?0.35+0.65*pt:0.65;
  const maxLoss=maxLossPS*100*N;
  const evShare=ok(pop)?pop*CR-(1-pop)*maxLossPS*tailAdj:NaN;
  const evCt=ok(evShare)?evShare*100:NaN;

  const aum=parseFloat(cfg?.aum)||0;
  const maxBpsRiskPct=parseFloat(cfg?.maxBpsRiskPct||"0.02");
  const maxCspNotionalPct=parseFloat(cfg?.maxCspNotionalPct||"0.25");
  const maxDeploymentPct=parseFloat(cfg?.maxDeploymentPct||"0.80");

  const capital={notional:0,definedRisk:0,totalMaxLoss:maxLoss,deploymentPct:0,cspUsagePct:0,bpsUsagePct:0,pass:true,details:[]};
  if (aum>0) {
    const pos=openPositions||[];
    const existingCsp=pos.filter(p=>p.str==="CSP").reduce((s,p)=>s+(Number(p.entry?.strike)*100*(Number(p.entry?.contracts)||1)),0);
    const existingBps=pos.filter(p=>p.str==="PCS").reduce((s,p)=>s+(((Number(p.entry?.width)||0)-(Number(p.entry?.credit)||0))*100*(Number(p.entry?.contracts)||1)),0);
    const thisCsp=STR==="CSP"?(Kshort*100*N):0;
    const thisBps=STR==="PCS"?(maxLossPS*100*N):0;
    capital.notional=thisCsp; capital.definedRisk=thisBps;
    capital.cspUsagePct=thisCsp/aum; capital.bpsUsagePct=thisBps/aum;
    if (STR==="CSP"&&thisCsp>aum*maxCspNotionalPct) { capital.pass=false; capital.details.push({gate:"CSP NOTIONAL LIMIT",limit:aum*maxCspNotionalPct,actual:thisCsp}); }
    if (STR==="PCS"&&thisBps>aum*maxBpsRiskPct) { capital.pass=false; capital.details.push({gate:"PCS RISK LIMIT",limit:aum*maxBpsRiskPct,actual:thisBps}); }
    const totalDeploy=existingCsp+existingBps+thisCsp+thisBps;
    capital.deploymentPct=totalDeploy/aum;
    if (totalDeploy>aum*maxDeploymentPct) { capital.pass=false; capital.details.push({gate:"TOTAL DEPLOYMENT LIMIT",limit:aum*maxDeploymentPct,actual:totalDeploy}); }
  } else { capital.pass=false; capital.details.push({gate:"AUM NOT SET",limit:0,actual:0}); }

  return {
    structure:STR,rg,em,reqSigma,sigmaDistance,sigmaPass,rising,rv,vrp,vrpFloor:c.vrp,vrpPass,
    rMin,ror,rorPass,minPremium,maxLossPS,maxLoss,pop,pt,breakEven,cushionPct,
    s1,s2,pnl1,pnl2,pnl1_ct:pnl1*100,pnl2_ct:pnl2*100,evShare,evCt,capital,
    pass:sigmaPass&&vrpPass&&rorPass&&capital.pass,
  };
}

function positionStatus({ dte, sigma, reqSigma, pop, spot, breakEven }) {
  if (!ok(dte)) return { label: "AWAITING", color: K.tm, action: "ENTER DATA" };
  if (dte <= 0) return { label: "EXPIRED", color: K.r, action: "CLOSE/SETTLE" };
  if (![sigma,reqSigma,pop,spot,breakEven].every(ok)) return { label: "AWAITING", color: K.tm, action: "ENTER DATA" };
  if (spot<=breakEven||pop<0.50||sigma<0.50) return { label: "RED", color: K.r, action: "EXIT" };
  const nearBE=spot>breakEven&&spot<=breakEven*1.02;
  const sigmaMarg=sigma>=0.50&&sigma<reqSigma;
  const popMarg=pop>=0.50&&pop<0.60;
  if (nearBE||sigmaMarg||popMarg) return { label: "ORANGE", color: K.y, action: "MONITOR" };
  if (sigma>=reqSigma&&pop>=0.60&&spot>breakEven) return { label: "GREEN", color: K.g, action: "HOLD" };
  return { label: "MONITOR", color: K.y, action: "MONITOR" };
}

function pctDrop(refSpot, spot) {
  if (!ok(refSpot)||!ok(spot)||refSpot<=0) return NaN;
  return (spot-refSpot)/refSpot;
}
function asVol(x) { const v=Number(x); if (!ok(v)||v<=0) return NaN; return v>1?v/100:v; }
function dailyEM(spot, vol) { const s=Number(spot),v=asVol(vol); if (!ok(s)||s<=0||!ok(v)||v<=0) return NaN; return s*v*Math.sqrt(1/252); }
function dropSigma(refSpot, spot, vol) {
  const rs=Number(refSpot),s=Number(spot);
  if (!ok(rs)||rs<=0||!ok(s)||s<=0) return NaN;
  const em=dailyEM(s,vol); if (!ok(em)||em<=0) return NaN;
  return (rs-s)/em;
}
function rvExpanding(rv10,rv20) { if (!ok(rv10)||!ok(rv20)) return false; return rv10>rv20; }
function ivPremiumOk(iv20,rv20) { const iv=asVol(iv20),rv=asVol(rv20); if (!ok(iv)||!ok(rv)||rv<=0) return false; return (iv/rv)>=1.05; }
function signalTier({ refSpot, spot, iv20, rv10, rv20, vix }) {
  const iv=ok(iv20)?asVol(iv20):NaN;
  const rv10d=asVol(rv10),rv20d=asVol(rv20);
  const volProxy=ok(iv)?iv:Math.max(rv20d||NaN,rv10d||NaN);
  const ds=dropSigma(refSpot,spot,volProxy);
  if (!ok(ds)) return { label:"NONE",tier:"NONE",ds:NaN,col:K.tm,bg:"rgba(255,255,255,0.03)",br:K.cb };
  const confirmPaidVol=ok(iv)?ivPremiumOk(iv,rv20d):rvExpanding(rv10d,rv20d);
  let tier="NONE";
  if (ds>=1.50||(ok(vix)&&Number(vix)>=28)) tier="PANIC";
  else if (ds>=1.00) tier="STRONG";
  else if (ds>=0.75) tier="IDEA";
  if ((tier==="IDEA"||tier==="STRONG")&&!confirmPaidVol) tier="NONE";
  const map={IDEA:{col:K.a,bg:"rgba(59,130,246,0.10)",br:"rgba(59,130,246,0.35)"},STRONG:{col:K.g,bg:"rgba(34,197,94,0.10)",br:"rgba(34,197,94,0.35)"},PANIC:{col:K.r,bg:"rgba(239,68,68,0.10)",br:"rgba(239,68,68,0.35)"}};
  if (map[tier]) return { label:tier,tier,ds,...map[tier] };
  return { label:"NONE",tier:"NONE",ds,col:K.tm,bg:"rgba(255,255,255,0.03)",br:K.cb };
}
